// 芒聙聰 TA 芒聙聰
function calcInd(c){
  const cls=c.map(x=>x.c),n=cls.length;
  const ema=(d,p)=>{const k=2/(p+1);let e=d[0];for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e;};
  const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
  const e9=ema(cls,9),e21=ema(cls,21),e50=ema(cls,50);
  let g=0,ls=0;for(let i=1;i<n;i++){const d=cls[i]-cls[i-1];d>0?g+=d:ls-=d;}
  const rsi=100-100/(1+(g/(ls||.0001)));
  const m1=ema(cls,12)-ema(cls,26),hist=m1-ema(cls.slice(-9),9);
  const tr=c.slice(-14).map((x,i,a)=>i===0?7:Math.max(x.h-x.l,Math.abs(x.h-a[i-1].c),Math.abs(x.l-a[i-1].c)));
  const atr=avg(tr);
  const h=Math.max(...c.slice(-14).map(x=>x.h)),l=Math.min(...c.slice(-14).map(x=>x.l)),sm=avg(cls.slice(-20)),diffs=cls.slice(-20).map(x=>Math.abs(x-sm)),std=Math.sqrt(diffs.reduce((a,b)=>a+b*b,0)/diffs.length);
  const adx=Math.abs(rsi-50);
  return{ema9:e9,ema21:e21,ema50:e50,rsi,macd:m1,macLine:m1,hist,bbu:sm+2*std,bbl:sm-2*std,stdK:((cls[n-1]-l)/(h-l||1))*100,atr,adx};
}

function calcSig(c,i,sr=[]){
  let s=0,r=[];
  if(i.rsi<30){s+=3;r.push("RSI sobrevendido");}else if(i.rsi>70){s-=3;r.push("RSI sobrecomprado");}
  else if(i.rsi<45){s+=1;r.push("RSI alcista");}else if(i.rsi>55){s-=1;r.push("RSI bajista");}
  if(i.macLine>0&&i.hist>0){s+=2;r.push("MACD alcista fuerte");}else if(i.macLine<0&&i.hist<0){s-=2;r.push("MACD bajista fuerte");}
  if(i.stdK>80){s+=2;r.push("Estoc. sobrecomprado");}else if(i.stdK<20){s+=2;r.push("Estoc. sobrevendido");}
  if(i.adx>25){s+=2;r.push("ADX forte");}else if(i.adx<20){s+=1;r.push("Tendencia suave");}
  const b5=c.slice(-5).filter(x=>x.c>x.o).length;
  if(b5>=4){s+=1;r.push("Momentum alcista");}else if(5-b5>=4){s-=1;r.push("Momentum bajista");}

  // IMPROVEMENT 3: S&R proximity check
  const lastPrice=c[c.length-1].c;
  const range=Math.max(...c.slice(-20).map(x=>x.h))-Math.min(...c.slice(-20).map(x=>x.l));
  const tol=range*0.005;
  const nearSupport=sr.find(s=>s.type==='S'&&Math.abs(lastPrice-s.price)<=tol*2);
  const nearResistance=sr.find(s=>s.type==='R'&&Math.abs(lastPrice-s.price)<=tol*2);
  if(nearSupport){s+=nearSupport.strength;r.push("冒聼聼垄 Soporte clave: "+fmt(nearSupport.price));}
  if(nearResistance){s-=nearResistance.strength;r.push("冒聼聰麓 Resistencia clave: "+fmt(nearResistance.price));}

  return{dir:s>0?"COMPRA":"VENTA",conf:Math.min(96,45+Math.abs(s)*6).toFixed(0),reasons:r};
}

function calcSLTP(price,dir,atr){const d=(atr||price*.005)*1.5;return{sl:dir==="COMPRA"?price-d:price+d,tp:dir==="COMPRA"?price+d*2:price-d*2,dist:d};}

function calcTrend(c,ind){
  const eu=ind.ema9,e21=ind.ema21,e50=ind.ema50;
  if(eu>e21&&e21>e50)return{trend:"ALCISTA",color:"#10b981",icon:"冒聼聯聢",str:"Muy fuerte 冒聼聼垄"};
  if(eu<e21&&e21<e50)return{trend:"BAJISTA",color:"#ef4444",icon:"冒聼聯聣",str:"Muy fuerte 冒聼聰麓"};
  return{trend:"LATERAL",color:"#f59e0b",icon:"芒聠聰茂赂聫",str:"Sin tendencia"};
}

function genC(base,n=80){
  const v=base>1000?base*.004:base>1?base*.003:base*.002;
  let p=base*.986;
  const a=Array.from({length:n-1},()=>{const o=p,c=Math.max(o+(Math.random()-.48)*v,.00001);p=c;return{o,h:Math.max(o,c)+Math.random()*v*3,l:Math.min(o,c)-Math.random()*v*3,c};});
  a.push({o:p,h:Math.max(p,base),l:Math.min(p,base),c:base});return a;
}

// IMPROVEMENT 3: Advanced S&R Prediction
function calcSR(c){
  if(!c||c.length<15)return[];
  const sr=[];
  for(let i=3;i<c.length-3;i++){
    const isHigh=c[i].h>=c[i-1].h&&c[i].h>=c[i-2].h&&c[i].h>=c[i+1].h&&c[i].h>=c[i+2].h;
    const isLow=c[i].l<=c[i-1].l&&c[i].l<=c[i-2].l&&c[i].l<=c[i+1].l&&c[i].l<=c[i+2].l;
    if(isHigh)sr.push({price:c[i].h,type:'R',idx:i});
    if(isLow)sr.push({price:c[i].l,type:'S',idx:i});
  }
  const merged=[],range=Math.max(...c.map(x=>x.h))-Math.min(...c.map(x=>x.l));
  const tol=range*0.004;
  for(const lv of sr){
    const ex=merged.find(m=>Math.abs(m.price-lv.price)<=tol);
    if(ex){ex.strength++;ex.price=(ex.price*(ex.strength-1)+lv.price)/ex.strength;}
    else merged.push({...lv,strength:1});
  }
  return merged.filter(m=>m.strength>=2).sort((a,b)=>b.strength-a.strength).slice(0,8);
}

// 芒聙聰 DRAW CHART 芒聙聰
function drawChart(cvId,h){
  const cv=document.getElementById(cvId);if(!cv||!candles||!ind)return;
  const W=cv.offsetWidth|600;cv.width=W;cv.height=h||300;
  const H=h||300,ctx=cv.getContext("2d");
  const PL=54,PR=14,PT=20,PB=20,ca=W-PL-PR,ch=H-PT-PB;

  // IMPROVEMENT 1: Use visible slice instead of all candles
  const n=candles.length;
  const vis=candles.slice(Math.max(0,n-chartVisibleCandles-chartOffset),n-chartOffset||n);
  const ps=vis.flatMap(c=>[c.h,c.c,c.l]);
  if(sltp){ps.push(sltp.sl,sltp.tp);}
  const mn=Math.min(...ps)*.999,mx=Math.max(...ps)*1.0007,rng=mx-mn||1;
  const ty=p=>PT+ch*(1-(p-mn)/rng);
  const cw=Math.max(2,ca/vis.length-1.5);

  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"#0d1525");bg.addColorStop(1,"#0a0e1a");
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Grid
  for(let i=0;i<=8;i++){
    const t=i/8,y=PT+ch*t,p=mx-rng*t;
    ctx.strokeStyle="#1e2d45";ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
    ctx.fillStyle="#64748b";ctx.font="9px monospace";ctx.textAlign="right";
    ctx.fillText(p.toFixed(asset.dig>3?asset.dig:2),PL-3,y+3);
  }

  if(sltp){
    ctx.strokeStyle="#ef444480";ctx.lineWidth=1;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(PL,ty(sltp.sl));ctx.lineTo(W-PR,ty(sltp.sl));ctx.stroke();
    ctx.fillStyle="#ef4444cc";ctx.font="bold 9px monospace";ctx.textAlign="left";
    ctx.fillText("SL "+sltp.sl.toFixed(asset.dig>3?asset.dig:2),W-PR+2,ty(sltp.sl)+3);

    ctx.strokeStyle="#34d39988";ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(PL,ty(sltp.tp));ctx.lineTo(W-PR,ty(sltp.tp));ctx.stroke();
    ctx.fillStyle="#34d399cc";ctx.fillText("TP "+sltp.tp.toFixed(asset.dig>3?asset.dig:2),W-PR+2,ty(sltp.tp)-4);
    ctx.setLineDash([]);
  }

  // IMPROVEMENT 3: Draw S&R lines
  if(window._sr && window._sr.length){
    window._sr.forEach(lv=>{
      const y=ty(lv.price);
      ctx.strokeStyle=lv.type==='R'?'#ef444480':'#10b98180';
      ctx.lineWidth=1;ctx.setLineDash([5,5]);
      ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=lv.type==='R'?'#ef4444cc':'#10b981cc';
      ctx.font='bold 9px monospace';ctx.textAlign='left';
      ctx.fillText((lv.type==='R'?'R':'S')+lv.strength+' '+fmt(lv.price),W-PR+2,y+3);
    });
  }

  // Draw candles
  vis.forEach((c,i)=>{
    const x=PL+i*(ca/vis.length)+cw/2;
    const col=c.c>=c.o?"#10b981":"#ef4444";
    ctx.strokeStyle=col;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,ty(c.h));ctx.lineTo(x,ty(c.l));ctx.stroke();
    ctx.fillStyle=col;
    ctx.fillRect(x-cw/2,ty(Math.max(c.o,c.c)),cw,Math.max(1,Math.abs(ty(c.o)-ty(c.c))));
  });

  // IMPROVEMENT 3: Draw prediction arrow only on last candle with larger, more visible arrow
  if(sig && vis.length > 0) {
    const lc2 = vis[vis.length - 1];
    const x2 = PL + (vis.length-1)*(ca/vis.length) + cw/2;
    const buy2 = sig.dir === "COMPRA";
    const sz = 6;
    ctx.shadowBlur = 20; ctx.shadowColor = buy2?"#10b981":"#ef4444";
    if(buy2){
      const ay = ty(lc2.l) + 8 + sz;
      ctx.fillStyle = "#10b981"; ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x2, ay-sz*1.5); ctx.lineTo(x2-sz*.9,ay); ctx.lineTo(x2+sz*.9,ay); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#10b981"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.fillText("芒聳虏 BUY", x2, ay+12);
    } else {
      const ay = ty(lc2.h) - 8 - sz;
      ctx.fillStyle = "#ef4444"; ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x2, ay+sz*1.5); ctx.lineTo(x2-sz*.9,ay); ctx.lineTo(x2+sz*.9,ay); ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = "#ef4444"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.fillText("芒聳录 SELL", x2, ay-6);
    }
    ctx.shadowBlur = 0;

    // Signal strength indicator
    const confVal = parseInt(sig.conf||0);
    const barW = Math.min(80, confVal * 0.8);
    ctx.fillStyle = buy2?"#10b98133":"#ef444433";
    ctx.fillRect(x2-40, buy2?ty(lc2.l)+20:ty(lc2.h)-30, barW, 6);
    ctx.fillStyle = buy2?"#10b981":"#ef4444";
    ctx.fillRect(x2-40, buy2?ty(lc2.l)+20:ty(lc2.h)-30, barW*(confVal/100), 6);
    ctx.fillStyle = "#fff"; ctx.font = "8px monospace"; ctx.textAlign = "center";
    ctx.fillText(confVal+"%", x2, buy2?ty(lc2.l)+34:ty(lc2.h)-35);
  }

  attachChartEvents(cvId);
}

// IMPROVEMENT 1: Attach chart mouse events for zoom and pan
function attachChartEvents(cvId) {
  const cv = document.getElementById(cvId);
  if(!cv) return;
  cv.onwheel = e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 5 : -5;
    chartVisibleCandles = Math.max(20, Math.min(candles?.length||200, chartVisibleCandles+delta));
    drawChart(cvId, chartH);
  };
  cv.onmousedown = e => { chartDragging=true; chartDragX=e.clientX; chartDragOff=chartOffset; };
  cv.onmousemove = e => {
    if(!chartDragging) return;
    const dx = e.clientX - chartDragX;
    const cv2 = document.getElementById(cvId);
    const cw2 = cv2 ? (cv2.offsetWidth-68)/(chartVisibleCandles||80) : 8;
    chartOffset = Math.max(0, Math.min((candles?.length||0)-chartVisibleCandles, Math.round(chartDragOff - dx/cw2)));
    drawChart(cvId, chartH);
  };
  cv.onmouseup = () => { chartDragging=false; };
  cv.onmouseleave = () => { chartDragging=false; };
  cv.style.cursor = 'crosshair';
}

async function doAnalyze(silent=false){
  if(!sess)return;
  if(!silent){const btn=document.getElementById("btn-analyze");if(btn){btn.disabled=true;btn.textContent="冒聼聰聛";}}
  const err=document.getElementById("err-bar");if(err)err.style.display='none';
  try{
    const mr=await fetch(PROXY+"/markets/"+asset.epic,{headers:getH()});
    if(!mr.ok)throw new Error("HTTP "+mr.status);
    const md=await mr.json();
    bid=md?.snapshot?.bid||md?.snapshot?.offer;
    ask=md?.snapshot?.ask||md?.snapshot?.offer||bid;
    if(!bid)throw new Error("Activo no disponible.");
    mid=(bid+ask)/2;
    let cands;
    try{
      const pr=await fetch(PROXY+"/prices/"+asset.epic+"?resolution="+TFS[tfIdx].v+"&max=80",{headers:getH()});
      const pd=await pr.json();
      if(pd?.prices?.length>=10){
        cands=pd.prices.map(p=>({o:(p.openPrice.bid+p.openPrice.ask)/2,h:(p.highPrice.bid+p.highPrice.ask)/2,l:(p.lowPrice.bid+p.lowPrice.ask)/2,c:(p.closePrice.bid+p.closePrice.ask)/2}));
      }else throw new Error("Low data");
    }catch{cands=genC(mid,80);}
    candles=cands;ind=calcInd(candles);
    const sr=calcSR(candles);
    sig=calcSig(candles,ind,sr);
    window._sr=sr;
    sltp=calcSLTP(mid,sig.dir,ind.atr);trendInfo=calcTrend(candles,ind);
    countdown=30;
    if(prevSig&&prevSig!==sig.dir)addAlert(sig.dir==="COMPRA"?"buy":"sell","冒聼聯聤 "+asset.d+" - "+sig.conf+"% "+(sig.dir==="COMPRA"?"冒聼聼垄 COMPRA":"冒聼聰麓 VENTA")+" "+fmt(mid));
    prevSig=sig.dir;
    await fetchAccount();await fetchPositions();
    render();
  }catch(e){if(!silent&&document.getElementById("err-bar")){document.getElementById("err-bar").textContent="芒聺聦 "+e.message;document.getElementById("err-bar").style.display="block";}}
  const btn=document.getElementById("btn-analyze");if(btn){btn.disabled=false;btn.textContent="冒聼聰聧 Analizar";}
}

async function openTrade(size,useSLTP){

  if(useSLTP){body.stopLevel=parseFloat(sltp.sl.toFixed(asset.dig>3?asset.dig:2));body.profitLevel=parseFloat(sltp.tp.toFixed(asset.dig>3?asset.dig:2));}
  try{
    const r=await fetch(PROXY+"/positions",{method:"POST",headers:{...getH(),"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok)throw new Error(d.errorCode||d.error||"HTTP "+r.status);
