// ── TA ──────────────────────────────────────────────────────────────────────
function calcInd(c){
  const cls=c.map(x=>x.c),n=cls.length;
  const ema=(d,p)=>{const k=2/(p+1);let e=d[0];for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e;};
  const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
  const e9=ema(cls,9),e21=ema(cls,21),e50=ema(cls,50);
  let g=0,ls=0;for(let i=n-14;i<n;i++){const d=cls[i]-cls[i-1];d>0?g+=d:ls-=d;}
  const rsi=100-100/(1+(g/(ls||.0001)));
  const ml=ema(cls,12)-ema(cls,26),hist=ml-ema(cls.slice(-9),3);
  const sm=avg(cls.slice(-20)),std=Math.sqrt(cls.slice(-20).reduce((a,b)=>a+(b-sm)**2,0)/20);
  const hi=Math.max(...c.slice(-14).map(x=>x.h)),lo=Math.min(...c.slice(-14).map(x=>x.l));
  const sk=((cls[n-1]-lo)/(hi-lo||1))*100,sd=avg([sk,sk*.97,sk*1.02]);
  const trs=c.slice(-14).map((x,i,a)=>i===0?x.h-x.l:Math.max(x.h-x.l,Math.abs(x.h-a[i-1].c),Math.abs(x.l-a[i-1].c)));
  const atr=avg(trs);
  let pDM=0,mDM=0,trS=0;
  for(let i=n-14;i<n;i++){
    const u=i>0?Math.max(0,c[i].h-c[i-1].h):0,d=i>0?Math.max(0,c[i-1].l-c[i].l):0;
    if(u>d)pDM+=u;if(d>u)mDM+=d;
    trS+=i>0?Math.max(c[i].h-c[i].l,Math.abs(c[i].h-c[i-1].c),Math.abs(c[i].l-c[i-1].c)):c[i].h-c[i].l;
  }
  const adx=Math.min(99,Math.abs(pDM-mDM)/(pDM+mDM||1)*100*2);
  return{ema9:e9,ema21:e21,ema50:e50,rsi,macdLine:ml,hist,bbU:sm+2*std,bbL:sm-2*std,stochK:sk,stochD:sd,atr,adx,sma20:sm};
}

function calcSig(c,i){
  let s=0,reasons=[];
  const last=c[c.length-1];
  if(i.rsi<30){s+=3;reasons.push({t:"🟢",m:`RSI sobrevendido (${i.rsi.toFixed(1)})`});}
  else if(i.rsi>70){s-=3;reasons.push({t:"🔴",m:`RSI sobrecomprado (${i.rsi.toFixed(1)})`});}
  else if(i.rsi<45){s-=1;reasons.push({t:"🟡",m:"RSI bajista"});}
  else{s+=1;reasons.push({t:"🟡",m:"RSI alcista"});}
  if(i.macdLine>0&&i.hist>0){s+=2;reasons.push({t:"🟢",m:"MACD alcista fuerte"});}
  else if(i.macdLine<0&&i.hist<0){s-=2;reasons.push({t:"🔴",m:"MACD bajista fuerte"});}
  if(i.ema9>i.ema21&&i.ema21>i.ema50){s+=2;reasons.push({t:"🟢",m:"EMA9>EMA21>EMA50"});}
  else if(i.ema9<i.ema21&&i.ema21<i.ema50){s-=2;reasons.push({t:"🔴",m:"EMA9<EMA21<EMA50"});}
  if(last.c<i.bbL){s+=2;reasons.push({t:"🟢",m:"Bajo BB inferior"});}
  else if(last.c>i.bbU){s-=2;reasons.push({t:"🔴",m:"Sobre BB superior"});}
  if(i.stochK<20&&i.stochK>i.stochD){s+=2;reasons.push({t:"🟢",m:"Estoc. sobrevendido+cruce"});}
  else if(i.stochK>80&&i.stochK<i.stochD){s-=2;reasons.push({t:"🔴",m:"Estoc. sobrecomprado+cruce"});}
  if(i.adx>25){s=s>0?s+1:s-1;reasons.push({t:"📊",m:`ADX ${i.adx.toFixed(0)}`});}
  const b5=c.slice(-5).filter(x=>x.c>x.o).length;
  if(b5>=4){s+=1;reasons.push({t:"🟢",m:`Momentum (${b5}/5 verdes)`});}
  else if(b5<=1){s-=1;reasons.push({t:"🔴",m:"Momentum bajista"});}
  return{dir:s>=0?"COMPRA":"VENTA",conf:Math.min(96,45+Math.abs(s)*6).toFixed(0),reasons};
}

function calcSLTP(price,dir,atr){
  const d=(atr||price*.005)*1.5;
  return{sl:dir==="COMPRA"?price-d:price+d,tp:dir==="COMPRA"?price+d*2:price-d*2,dist:d};
}

function calcTrend(c,i){
  const eu=i.ema9>i.ema21&&i.ema21>i.ema50,ed=i.ema9<i.ema21&&i.ema21<i.ema50;
  const vs=i.adx>40,st=i.adx>25;
  const str=vs?"Muy fuerte 🔥":st?"Moderada ✅":"Débil ⚠️";
  const tm={MINUTE:1,MINUTE_5:5,MINUTE_15:15,MINUTE_30:30,HOUR:60,HOUR_4:240,DAY:1440};
  const mins=(tm[TFS[tfIdx].v]||60)*(vs?20:st?12:6);
  const dur=mins<60?`${mins}min`:mins<1440?`${(mins/60).toFixed(0)}h`:`${(mins/1440).toFixed(1)}d`;
  if(eu&&i.macdLine>0)return{trend:"ALCISTA",color:"#10b981",icon:"📈",str,dur,desc:"Estructura alcista confirmada"};
  if(ed&&i.macdLine<0)return{trend:"BAJISTA",color:"#ef4444",icon:"📉",str,dur,desc:"Estructura bajista confirmada"};
  return{trend:"LATERAL",color:"#f59e0b",icon:"↔️",str:"Sin tendencia",dur:"Indefinida",desc:"Mercado en consolidación"};
}

function genC(base,n=80){
  const v=base>1000?base*.006:base>100?base*.004:base>1?base*.003:base*.002;
  let p=base*.986;
  const a=Array.from({length:n-1},()=>{const o=p,c=Math.max(o+(Math.random()-.48)*v,.00001);p=c;return{o,h:Math.max(o,c)+Math.random()*v*.3,l:Math.min(o,c)-Math.random()*v*.3,c};});
  a.push({o:p,h:Math.max(p,base),l:Math.min(p,base),c:base});
  return a;
}

// ── DRAW CHART ───────────────────────────────────────────────────────────────
function drawChart(){
  const cv=document.getElementById("cv");
  if(!cv||!candles||!ind)return;
  const H=chartExpanded?380:220,W=cv.offsetWidth||480;
  cv.width=W;cv.height=H;
  const ctx=cv.getContext("2d");
  const PL=52,PR=12,PT=20,PB=20,ca=W-PL-PR,ch=H-PT-PB;
  const ps=candles.flatMap(c=>[c.h,c.l]);
  if(sltp){ps.push(sltp.sl,sltp.tp);}
  const mn=Math.min(...ps)*.9995,mx=Math.max(...ps)*1.0005,rng=mx-mn||1;
  const ty=p=>PT+ch*(1-(p-mn)/rng);
  const cw=Math.max(2,ca/candles.length-1.5);
  // BG
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"#0d1525");bg.addColorStop(1,"#070b14");
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Grid
  const gl=chartExpanded?8:6;
  for(let i=0;i<=gl;i++){
    const f=i/gl,y=PT+ch*f,p=mx-rng*f;
    ctx.strokeStyle="#1e2535";ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
    ctx.fillStyle="#4a5568";ctx.font="8px monospace";ctx.textAlign="right";
    ctx.fillText(p.toFixed(asset.dig>3?4:asset.dig),PL-3,y+3.5);
  }
  // SL/TP zones
  if(sltp){
    ctx.fillStyle="#ef444410";ctx.fillRect(PL,ty(sltp.sl)-1,ca,2);
    ctx.strokeStyle="#ef444488";ctx.lineWidth=1;ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.moveTo(PL,ty(sltp.sl));ctx.lineTo(W-PR,ty(sltp.sl));ctx.stroke();
    ctx.fillStyle="#ef4444dd";ctx.font="bold 8px sans-serif";ctx.textAlign="right";
    ctx.fillText("SL "+sltp.sl.toFixed(asset.dig>3?5:asset.dig),W-PR,ty(sltp.sl)-3);
    ctx.strokeStyle="#34d39988";
    ctx.beginPath();ctx.moveTo(PL,ty(sltp.tp));ctx.lineTo(W-PR,ty(sltp.tp));ctx.stroke();
    ctx.fillStyle="#34d399dd";ctx.fillText("TP "+sltp.tp.toFixed(asset.dig>3?5:asset.dig),W-PR,ty(sltp.tp)-3);
    ctx.setLineDash([]);
    if(mid){
      const ey=ty(mid),ty2=ty(sltp.tp),sy=ty(sltp.sl);
      const buy=sig?.dir==="COMPRA";
      ctx.fillStyle=buy?"#10b98108":"#ef444408";
      ctx.fillRect(PL,Math.min(ey,ty2),ca,Math.abs(ey-ty2));
      ctx.fillStyle="#ef444408";
      ctx.fillRect(PL,Math.min(ey,sy),ca,Math.abs(ey-sy));
    }
  }
  // BB
  ctx.strokeStyle="#7c3aed55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(PL,ty(ind.bbU));ctx.lineTo(W-PR,ty(ind.bbU));ctx.stroke();
  ctx.beginPath();ctx.moveTo(PL,ty(ind.bbL));ctx.lineTo(W-PR,ty(ind.bbL));ctx.stroke();
  ctx.fillStyle="#7c3aed06";ctx.fillRect(PL,ty(ind.bbU),ca,ty(ind.bbL)-ty(ind.bbU));
  ctx.setLineDash([]);
  // EMAs
  [[ind.ema9,"#f59e0baa",1.5],[ind.ema21,"#06b6d4aa",1.5],[ind.ema50,"#a78bfa55",1]].forEach(([v,col,lw])=>{
    ctx.strokeStyle=col;ctx.lineWidth=lw;
    ctx.beginPath();ctx.moveTo(PL,ty(v));ctx.lineTo(W-PR,ty(v));ctx.stroke();
  });
  // Candles
  candles.forEach((c,i)=>{
    const x=PL+i*(ca/candles.length)+cw/2,bull=c.c>=c.o,col=bull?"#10b981":"#ef4444";
    ctx.strokeStyle=col;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,ty(c.h));ctx.lineTo(x,ty(c.l));ctx.stroke();
    ctx.fillStyle=col+"cc";
    ctx.fillRect(x-cw/2,ty(Math.max(c.o,c.c)),cw,Math.max(1,Math.abs(ty(c.o)-ty(c.c))));
  });
  // ── BUY/SELL ARROWS ──
  if(sig&&candles.length>0){
    const buy=sig.dir==="COMPRA";
    const n=candles.length;
    // Historical signal arrows (small)
    for(let i=Math.max(1,n-20);i<n-1;i++){
      const prev=candles[i-1];
      const curr=candles[i];
      const wasBull=prev.c<prev.o&&curr.c>curr.o; // reversal up
      const wasBear=prev.c>prev.o&&curr.c<curr.o; // reversal down
      if(!wasBull&&!wasBear)continue;
      const x=PL+i*(ca/candles.length)+cw/2;
      const sz=chartExpanded?7:5;
      if(wasBull){
        const ay=ty(curr.l)+4+sz;
        ctx.fillStyle="#10b98177";ctx.shadowColor="#10b981";ctx.shadowBlur=4;
        ctx.beginPath();ctx.moveTo(x,ay-sz);ctx.lineTo(x-sz*.7,ay);ctx.lineTo(x+sz*.7,ay);ctx.closePath();ctx.fill();
        ctx.shadowBlur=0;
      } else {
        const ay=ty(curr.h)-4-sz;
        ctx.fillStyle="#ef444477";ctx.shadowColor="#ef4444";ctx.shadowBlur=4;
        ctx.beginPath();ctx.moveTo(x,ay+sz);ctx.lineTo(x-sz*.7,ay);ctx.lineTo(x+sz*.7,ay);ctx.closePath();ctx.fill();
        ctx.shadowBlur=0;
      }
    }
    // MAIN arrow on last candle
    const lastC=candles[n-1];
    const x=PL+(n-1)*(ca/candles.length)+cw/2;
    const sz=chartExpanded?16:12;
    const gap=chartExpanded?8:5;
    if(buy){
      const ay=ty(lastC.l)+gap+sz;
      ctx.fillStyle="#10b981";ctx.shadowColor="#10b981";ctx.shadowBlur=12;
      ctx.beginPath();ctx.moveTo(x,ay-sz);ctx.lineTo(x-sz*.8,ay);ctx.lineTo(x+sz*.8,ay);ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle="#10b981";ctx.font=`bold ${chartExpanded?10:9}px sans-serif`;ctx.textAlign="center";
      ctx.fillText("BUY",x,ay+12);
    } else {
      const ay=ty(lastC.h)-gap-sz;
      ctx.fillStyle="#ef4444";ctx.shadowColor="#ef4444";ctx.shadowBlur=12;
      ctx.beginPath();ctx.moveTo(x,ay+sz);ctx.lineTo(x-sz*.8,ay);ctx.lineTo(x+sz*.8,ay);ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle="#ef4444";ctx.font=`bold ${chartExpanded?10:9}px sans-serif`;ctx.textAlign="center";
      ctx.fillText("SELL",x,ay-4);
    }
  }
  // Price badge
  const last=candles[candles.length-1];
  ctx.strokeStyle="#ffffff22";ctx.lineWidth=1;ctx.setLineDash([2,4]);
  ctx.beginPath();ctx.moveTo(PL,ty(last.c));ctx.lineTo(W-PR,ty(last.c));ctx.stroke();ctx.setLineDash([]);
  const pc=sig?.dir==="COMPRA"?"#10b981":"#ef4444";
  const bW=70,bH=16;
  ctx.fillStyle=pc;ctx.beginPath();ctx.roundRect(W-PR-bW,ty(last.c)-bH/2,bW,bH,4);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 9px monospace";ctx.textAlign="center";
  ctx.fillText(last.c.toFixed(asset.dig>3?5:asset.dig),W-PR-bW/2,ty(last.c)+4);
}

// ── FETCH + ANALYZE ──────────────────────────────────────────────────────────
async function doAnalyze(silent=false){
  if(!sess)return;
  if(!silent){document.getElementById("btn-analyze").disabled=true;document.getElementById("btn-analyze").textContent="⏳ Cargando...";}
  document.getElementById("err-bar").style.display="none";
  const H={"x-cst":sess.cst,"x-token":sess.token,"x-base":sess.base};
  try{
    const mr=await fetch(PROXY+"/markets/"+asset.epic,{headers:H});
    if(mr.status===401)throw new Error("Sesión expirada. Reconectáte.");
    if(!mr.ok)throw new Error("HTTP "+mr.status);
    const md=await mr.json();
    const nb=md?.snapshot?.bid,na=md?.snapshot?.offer;
    if(!nb)throw new Error("Activo no disponible.");
    bid=nb;ask=na;mid=(nb+na)/2;
    let cands;
    try{
      const pr=await fetch(PROXY+"/prices/"+asset.epic+"?resolution="+TFS[tfIdx].v+"&max=80",{headers:H});
      const pd=await pr.json();
      if(pd?.prices?.length>=10){
        cands=pd.prices.map(p=>({o:(p.openPrice.bid+p.openPrice.ask)/2,h:(p.highPrice.bid+p.highPrice.ask)/2,l:(p.lowPrice.bid+p.lowPrice.ask)/2,c:(p.closePrice.bid+p.closePrice.ask)/2}));
        cands[cands.length-1].c=mid;
        cands[cands.length-1].h=Math.max(cands[cands.length-1].h,mid);
        cands[cands.length-1].l=Math.min(cands[cands.length-1].l,mid);
      }else throw 0;
    }catch{cands=genC(mid,80);}
    candles=cands;ind=calcInd(cands);sig=calcSig(cands,ind);sltp=calcSLTP(mid,sig.dir,ind.atr);trend=calcTrend(cands,ind);
    // Signal change detection
    if(prevSig&&prevSig!==sig.dir){
      addAlert(sig.dir==="COMPRA"?"buy":"sell",`🚨 ${asset.d} CAMBIO → ${sig.dir==="COMPRA"?"🟢 COMPRAR":"🔴 VENDER"} @ ${fmt(mid)} | Conf:${sig.conf}%`);
    }
    prevSig=sig.dir;
    renderTrading();
  }catch(e){
    if(!silent){const eb=document.getElementById("err-bar");eb.textContent="❌ "+e.message;eb.style.display="block";}
  }
  if(!silent){const btn=document.getElementById("btn-analyze");btn.disabled=false;btn.textContent="⚡ Analizar";}
}

async function doLoginHandler(){
  const ak=document.getElementById('l-key').value.trim();

  const pw=document.getElementById('l-pass').value.trim();

  try{

function startTimers(){
  clearInterval(liveTimer);clearInterval(countTimer);
  liveTimer=setInterval(()=>{if(candles)doAnalyze(true);},30000);
  countTimer=setInterval(()=>{
    countdown=countdown<=1?30:countdown-1;
    const cb=document.getElementById("cbar");
    if(cb)cb.style.width=((countdown/30)*100)+"%";
    const ct=document.getElementById("ctxt");
    if(ct)ct.textContent=countdown+"s";
  },1000);
  // Session renew
  setInterval(async()=>{
    if(!sess)return;
    try{
      const r=await fetch(PROXY+"/session",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:sess.apiKey,email:sess.email,password:sess.pass,demo:sess.demo})});
      const d=await r.json();if(d.cst&&d.token){sess.cst=d.cst;sess.token=d.token;}
    }catch{}
  },8*60*1000);
}

  <div class="panel ${tab==='risk'?'on':''}" id="panel-risk">
    <div style="display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap">
      ${[{l:"Capital ($)",id:"r-cap",v:capital},{l:"Riesgo (%)",id:"r-risk",v:risk,min:.5,max:10,step:.5},{l:"Apalancamiento",id:"r-lev",v:leverage,min:1,max:500}].map(f=>`
      <div style="flex:1;min-width:80px"><label style="font-size:9px;color:#6b7280;display:block;margin-bottom:3px">${f.l}</label>
      <input type="number" id="${f.id}" value="${f.v}" min="${f.min}" max="${f.max}" step="${f.step}" oninput="updateRiskH()" style="width:100%;background:#1e2535;border:1px solid #374151;border-radius:7px;padding:7px 9px;color:#fff;font-size:12px;box-sizing:border-box;outline:none"/></div>`).join("")}
    </div>
    <div class="risk-grid" id="risk-grid"></div>
    <div style="background:#1e2535;border-radius:8px;padding:9px;font-size:10px;color:#94a3b8;line-height:1.7">
      <b style="color:#fbbf24">⚠️ Reglas</b> · Máx 2% capital · SL siempre · Ratio 1:2 mínimo
    </div>
  </div>

  <!-- ALERTS PANEL -->
  <div class="panel ${tab==='alerts'?'on':''}" id="panel-alerts">
    <div class="alert-toggle" onclick="toggleAlertsH()">
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:16px">🔔</span>
        <div><div style="font-size:11px;font-weight:600;color:#e2e8f0">Alertas en tiempo real</div><div style="font-size:9px;color:#6b7280">Escaneo cada 30 segundos</div></div>
      </div>
      <div class="toggle-sw ${alertsOn?'on':''}" style="background:${alertsOn?'#10b981':'#374151'}"></div>
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:10px;color:#6b7280;margin-bottom:5px">Alertas por indicador:</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px" id="alert-ind-tags"></div>
    </div>
    <div style="max-height:200px;overflow-y:auto" id="alert-log-container"></div>
  </div>

  <!-- AI PANEL -->
  <div class="panel ${tab==='ai'?'on':''}" id="panel-ai">
    <button class="ai-btn" id="ai-btn" onclick="doAIHandler()">🤖 Analizar Gráfico con IA + Noticias en Vivo</button>
    <div id="ai-result"><div style="text-align:center;color:#4b5563;font-size:11px;padding:14px">La IA interpreta el gráfico, busca noticias y confirma la señal</div></div>
  </div>
  `:`
  <div style="text-align:center;padding:32px 14px;animation:fadeIn .4s ease">
    <div style="font-size:44px;margin-bottom:8px">📡</div>
    <p style="font-size:13px;color:#6b7280">Selecciona un activo y presiona <b style="color:#6366f1">⚡ Analizar</b></p>
    <small style="font-size:10px;color:#374151;margin-top:4px;display:block">Auto-actualización cada 30s · Datos reales Capital.com</small>
  </div>`}

  <div class="warn">⚠️ CFDs implican alto riesgo. +70% de inversores pierden dinero. No es asesoramiento financiero.</div>
  </div>`;

  if(candles&&sig&&ind&&sltp){
    setTimeout(()=>{drawChart();renderIndicators();updateRiskH();renderAlerts();},50);
  }
}

function renderIndicators(){
  const grid=document.getElementById("ind-grid");if(!grid||!ind)return;
  const cards=[
    {key:"RSI",name:"RSI (14)",value:ind.rsi.toFixed(2),status:ind.rsi<30?"⬇ SOBREVENDIDO":ind.rsi>70?"⬆ SOBRECOMPRADO":ind.rsi<45?"Bajista":"Alcista",bull:ind.rsi<50,bar:ind.rsi,sig:ind.rsi<30?"COMPRA":ind.rsi>70?"VENTA":null},
    {key:"MACD",name:"MACD (12,26,9)",value:ind.macdLine.toFixed(5),status:ind.macdLine>0&&ind.hist>0?"⬆ ALCISTA FUERTE":ind.macdLine>0?"Alcista":ind.macdLine<0&&ind.hist<0?"⬇ BAJISTA FUERTE":"Bajista",bull:ind.macdLine>0,bar:50+Math.min(50,Math.abs(ind.macdLine/(mid||1)*5000)),sig:ind.macdLine>0&&ind.hist>0?"COMPRA":ind.macdLine<0&&ind.hist<0?"VENTA":null},
    {key:"Estocástico",name:"Estocástico %K/%D",value:`${ind.stochK.toFixed(1)}/${ind.stochD.toFixed(1)}`,status:ind.stochK<20?"⬇ SOBREVENDIDO":ind.stochK>80?"⬆ SOBRECOMPRADO":ind.stochK>ind.stochD?"Cruce alcista":"Cruce bajista",bull:ind.stochK<50,bar:ind.stochK,sig:ind.stochK<20?"COMPRA":ind.stochK>80?"VENTA":null},
    {key:"ADX",name:"ADX (Fuerza)",value:ind.adx.toFixed(1),status:ind.adx>50?"MUY FUERTE 🔥":ind.adx>25?"Fuerte ✅":ind.adx>20?"Moderada":"Sin tendencia",bull:ind.adx>25,bar:Math.min(ind.adx,100),sig:null},
    {key:"ATR",name:"Volatilidad ATR",value:fmt(ind.atr),status:ind.atr>(mid||1)*.01?"Alta ⚡":"Baja/Normal",bull:true,bar:Math.min((ind.atr/(mid||1))*1000,100),sig:null},
    {key:"Bollinger",name:"Bollinger Bands",value:`${fmt(ind.bbU)}/${fmt(ind.bbL)}`,status:mid>ind.bbU?"Sobre BB Superior":mid<ind.bbL?"Bajo BB Inferior":"Dentro bandas",bull:mid<ind.bbL,bar:(mid-ind.bbL)/((ind.bbU-ind.bbL)||1)*100,sig:mid<ind.bbL?"COMPRA":mid>ind.bbU?"VENTA":null},
  ];
  grid.innerHTML=cards.map(c=>{
    const col=c.bull?"#10b981":"#ef4444";
    const cfg=indAlerts[c.key];
    return`<div class="ind-card" style="border-color:${c.key in indAlerts&&indAlerts[c.key]?'#f59e0b55':'#1e2535'}">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;border-radius:11px 11px 0 0;background:${col}"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-top:5px;margin-bottom:3px">
        <div class="ind-name">${c.name}</div>
        <div style="display:flex;gap:3px">
          <button onclick="openAlertMenu('${c.key}')" style="background:${cfg?'#f59e0b22':'#1e2535'};border:1px solid ${cfg?'#f59e0b55':'#374151'};border-radius:5px;padding:1px 5px;cursor:pointer;font-size:10px;color:${cfg?'#f59e0b':'#6b7280'}">🔔</button>
          <button onclick="toggleIndFav('${c.key}')" style="background:#1e2535;border:1px solid #374151;border-radius:5px;padding:1px 5px;cursor:pointer;font-size:11px;color:#6b7280">☆</button>
        </div>
      </div>
      <div class="ind-val">${c.value}</div>
      <div class="ind-status" style="color:${col}">${c.status}</div>
      <div class="ind-bar"><div class="ind-bar-fill" style="width:${Math.min(100,Math.max(0,c.bar))}%;background:${col}"></div></div>
      ${c.sig?`<div style="margin-top:5px;display:inline-flex;align-items:center;gap:3px;background:${c.sig==='COMPRA'?'#065f4622':'#7f1d1d22'};border:1px solid ${c.sig==='COMPRA'?'#10b98133':'#ef444433'};border-radius:16px;padding:2px 7px;font-size:9px;font-weight:700;color:${c.sig==='COMPRA'?'#10b981':'#ef4444'}">${c.sig==='COMPRA'?'↑ COMPRA':'↓ VENTA'}</div>`:""}
    </div>`;
  }).join("");
}

function updateRiskH(){
  capital=parseFloat(document.getElementById("r-cap")?.value)||1000;
  risk=parseFloat(document.getElementById("r-risk")?.value)||2;
  leverage=parseFloat(document.getElementById("r-lev")?.value)||30;
  const grid=document.getElementById("risk-grid");if(!grid||!sltp)return;
  const ra=capital*(risk/100),ga=ra*2,ps=(ra/sltp.dist).toFixed(4),mg=(parseFloat(ps)*(mid||1)/leverage).toFixed(2);
  const slP=(sltp.dist/asset.pip).toFixed(0),tpP=((sltp.dist*2)/asset.pip).toFixed(0);
  grid.innerHTML=[{i:"🛑",v:`$${ra.toFixed(2)}`,l:"Pérdida máx.",c:"#ef4444"},{i:"🎯",v:`$${ga.toFixed(2)}`,l:"Ganancia pot.",c:"#10b981"},{i:"📊",v:ps,l:"Tamaño pos.",c:"#fbbf24"},{i:"📉",v:slP+" pip",l:"Pips SL",c:"#94a3b8"},{i:"📈",v:tpP+" pip",l:"Pips TP",c:"#94a3b8"},{i:"⚡",v:`$${mg}`,l:"Margen req.",c:"#a78bfa"}].map(({i,v,l,c})=>`
  <div class="risk-card"><div style="font-size:14px">${i}</div><div style="font-size:12px;font-weight:700;color:${c};margin:2px 0">${v}</div><div style="font-size:8px;color:#6b7280">${l}</div></div>`).join("");
}

function renderAlerts(){
  const tags=document.getElementById("alert-ind-tags");
  const log=document.getElementById("alert-log-container");
  if(tags){
    const configured=Object.entries(indAlerts).filter(([,v])=>v);
    tags.innerHTML=configured.length?configured.map(([k,v])=>`<div style="background:#1e2535;border-radius:14px;padding:2px 7px;font-size:9px;color:#a5b4fc;border:1px solid #374151">🔔 ${k}: ${v==="both"?"ambas":v==="buy"?"compra":"venta"}</div>`).join("")
    :`<div style="font-size:9px;color:#4b5563">Sin alertas · Ve a Indicadores → 🔔</div>`;
  }
  if(log){
    log.innerHTML=alertLog.length===0?`<div style="text-align:center;color:#4b5563;font-size:11px;padding:14px">🔔 Activa alertas para recibir señales</div>`
    :alertLog.map(a=>{
      const bg={buy:"#065f4622",sell:"#7f1d1d22",warn:"#78350f22",info:"#1e1b4b22"}[a.type]||"#1e2535";
      const bc={buy:"#10b98133",sell:"#ef444433",warn:"#f59e0b33",info:"#6366f133"}[a.type]||"#374151";
      return`<div class="alert-item" style="background:${bg};border:1px solid ${bc}">
        <span style="font-size:8px;color:#6b7280;min-width:42px;padding-top:1px">${a.time}</span>
        <span style="font-size:10px;color:#e2e8f0;flex:1">${a.msg}</span>
      </div>`;
    }).join("");
  }
}

// ── HANDLERS ─────────────────────────────────────────────────────────────────
function setCatH(c){cat=c;if(ASSETS[c]?.length>0)asset=ASSETS[c][0];candles=null;prevSig=null;renderTrading();}
function setAssetH(e){asset=ALL.find(a=>a.epic===e)||asset;candles=null;prevSig=null;renderTrading();}
function setTFH(i){tfIdx=i;candles=null;prevSig=null;renderTrading();}
function setTabH(t){tab=t;renderTrading();if(t==="chart")setTimeout(drawChart,50);}
function toggleExpand(){chartExpanded=!chartExpanded;renderTrading();setTimeout(drawChart,50);}
function toggleFavH(epic){
  const idx=favorites.indexOf(epic);
  if(idx>=0){favorites.splice(idx,1);toast("☆ "+epic+" eliminado de favoritos","info");}
  else{favorites.push(epic);toast("★ "+epic+" agregado a favoritos","info");}
  renderTrading();
}
function doLogoutHandler(){
  clearInterval(liveTimer);clearInterval(countTimer);clearInterval(alertTimer);
  sess=null;candles=null;alertsOn=false;prevSig=null;page="login";renderLogin();
}
function toggleAlertsH(){
  alertsOn=!alertsOn;
  addAlert("info",alertsOn?"🔔 Alertas activadas · escaneo 30s":"🔕 Alertas desactivadas");
  if(alertsOn){
    clearInterval(alertTimer);
    alertTimer=setInterval(async()=>{
      if(!sess||!candles)return;
      const H={"x-cst":sess.cst,"x-token":sess.token,"x-base":sess.base};
      try{
        const r=await fetch(PROXY+"/markets/"+asset.epic,{headers:H});
        if(!r.ok)return;
        const d=await r.json();const nb=d?.snapshot?.bid,na=d?.snapshot?.offer;if(!nb)return;
        const nm=(nb+na)/2;
        const updated=[...candles.slice(0,-1),{...candles[candles.length-1],c:nm}];
        const ni=calcInd(updated),ns=calcSig(updated,ni);
        if(prevSig&&ns.dir!==prevSig)addAlert(ns.dir==="COMPRA"?"buy":"sell",`${ns.dir==="COMPRA"?"🟢 COMPRAR":"🔴 VENDER"} ${asset.d} @ ${nm.toFixed(asset.dig>3?5:asset.dig)} | Conf:${ns.conf}%`);
        if(sltp){const slP=Math.abs(nm-sltp.sl)/asset.pip,tpP=Math.abs(nm-sltp.tp)/asset.pip;
          if(slP<10)addAlert("warn",`⚠️ ${asset.d} cerca del SL (${slP.toFixed(0)} pips)`);
          if(tpP<10)addAlert("buy",`🎯 ${asset.d} cerca del TP (${tpP.toFixed(0)} pips)`);
        }
        Object.entries(indAlerts).forEach(([k,cfg])=>{
          if(!cfg)return;let is=null;
          if(k==="RSI")is=ni.rsi<30?"COMPRA":ni.rsi>70?"VENTA":null;
          if(k==="MACD")is=ni.macdLine>0&&ni.hist>0?"COMPRA":ni.macdLine<0&&ni.hist<0?"VENTA":null;
          if(k==="Estocástico")is=ni.stochK<20?"COMPRA":ni.stochK>80?"VENTA":null;
          if(is&&(cfg==="both"||(cfg==="buy"&&is==="COMPRA")||(cfg==="sell"&&is==="VENTA")))
            addAlert(is==="COMPRA"?"buy":"sell",`🔔 [${k}] ${is} ${asset.d}`);
        });
        setBid(nb);setAsk(na);mid=nm;
      }catch{}
    },30000);
  }else clearInterval(alertTimer);
  renderTrading();
}

function openAlertMenu(key){
  const opt=indAlerts[key];
  const next=opt===undefined?'buy':opt==='buy'?'sell':opt==='sell'?'both':null;
  indAlerts[key]=next;
  toast(next?`🔔 ${key}: alertar ${next==="both"?"ambas":next==="buy"?"compra":"venta"}`:`🔕 ${key}: sin alerta`,"info");
  renderIndicators();renderAlerts();
}
function toggleIndFav(key){toast("★ "+key+" guardado","info");}

async function doAIHandler(){
  const btn=document.getElementById("ai-btn");
  const res=document.getElementById("ai-result");
  if(!btn||!res)return;
  btn.disabled=true;btn.textContent="⏳ Analizando gráfico + indicadores + noticias...";
  res.innerHTML="";
  const n=candles?.length||0;
  const lastC=candles?.[n-1];
  const prevC=candles?.[n-2];
  let patterns=[];
  if(lastC&&prevC){
    const body=Math.abs(lastC.c-lastC.o),range=lastC.h-lastC.l;
    if(body<range*.1)patterns.push("Doji (indecisión)");
    const lower=Math.min(lastC.o,lastC.c)-lastC.l;
    const upper=lastC.h-Math.max(lastC.o,lastC.c);
    if(lower>body*2)patterns.push("Hammer (posible reversal alcista)");
    if(upper>body*2)patterns.push("Shooting Star (posible reversal bajista)");
    if(body>Math.abs(prevC.c-prevC.o)*1.5){
      patterns.push(lastC.c>lastC.o?"Vela alcista fuerte":"Vela bajista fuerte");
    }
    const b5=candles.slice(-5).filter(c=>c.c>c.o).length;
    if(b5>=4)patterns.push(`${b5}/5 velas verdes`);
    if(b5<=1)patterns.push(`${5-b5}/5 velas rojas`);
  }
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:1400,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:`Eres experto trader profesional en Capital.com. Analiza en español:

ACTIVO: ${asset.d} (${asset.name}) — Capital.com ${sess.demo?"DEMO":"LIVE"}
PRECIO: Bid=${fmt(bid)} | Ask=${fmt(ask)} | Mid=${fmt(mid)} | TF: ${TFS[tfIdx].l}
TENDENCIA: ${trend?.trend||"N/A"} (${trend?.str||"N/A"}) | Duración estimada: ${trend?.dur||"N/A"}
PATRONES DE VELAS: ${patterns.join(", ")||"Sin patrón especial"}
PRECIO VS EMAs: EMA9=${fmt(ind.ema9)} (${mid>ind.ema9?"sobre":"bajo"}) | EMA21=${fmt(ind.ema21)} (${mid>ind.ema21?"sobre":"bajo"}) | EMA50=${fmt(ind.ema50)} (${mid>ind.ema50?"sobre":"bajo"})

INDICADORES:
RSI: ${ind.rsi.toFixed(2)} ${ind.rsi<30?"[SOBREVENDIDO]":ind.rsi>70?"[SOBRECOMPRADO]":"[NEUTRAL]"}
MACD: ${ind.macdLine.toFixed(5)} | Hist: ${ind.hist.toFixed(5)}
Estocástico: ${ind.stochK.toFixed(1)} / ${ind.stochD.toFixed(1)}
ADX: ${ind.adx.toFixed(1)} ${ind.adx>25?"[TENDENCIA]":"[SIN TENDENCIA]"}
ATR: ${fmt(ind.atr)} | BB: ${fmt(ind.bbU)} / ${fmt(ind.bbL)}

SEÑAL: ${sig.dir} | Confianza: ${sig.conf}% | SL: ${fmt(sltp?.sl)} | TP: ${fmt(sltp?.tp)}

1. 🔍 Busca noticias de HOY sobre ${asset.name}
2. 📊 Interpreta el gráfico ¿confirman los patrones la señal?
3. ✅ Recomendación CLARA: COMPRAR/VENDER/ESPERAR con nivel de confianza
4. ⏱ Duración estimada de la oportunidad
5. 📍 3 soportes y 3 resistencias con precios exactos
6. 🎯 Cómo ejecutar en Capital.com paso a paso
7. ⚠️ Nivel de riesgo: BAJO/MEDIO/ALTO y por qué
8. 🔄 Cuándo salir si la señal falla

Formato profesional, secciones claras, precios exactos.`}]
      })
    });
    const d=await r.json();
    const txt=d.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n")||"Sin respuesta";
    res.innerHTML=`<div class="ai-result">${txt}</div>`;
  }catch(e){res.innerHTML=`<div style="color:#f87171;font-size:11px;padding:8px">❌ Error: ${e.message}</div>`;}
  btn.disabled=false;btn.textContent="🤖 Analizar Gráfico con IA + Noticias en Vivo";
}

// ── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
