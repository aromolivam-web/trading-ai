  setTimeout(()=>el.remove(),4500);
}

function addAlert(type,msg){alertLog.unshift({type,msg,time:nowT()});if(alertLog.length>80)alertLog.pop();}

// ── TA ──────────────────────────────────────────────────────────────────────
function calcInd(c){
  const cls=c.map(x=>x.c),n=cls.length;
  const ema=(d,p)=>{const k=2/(p+1);let e=d[0];for(let i=1;i<d.length;i++)e=d[i]*k+e*(1-k);return e;};
  const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
  const e9=ema(cls,9),e21=ema(cls,21),e50=ema(cls,50);
  let g=0,ls=0;for(let i=n-14;i<n;i++){const d=cls[i]-cls[i-1];d>0?g+=d:ls-=d;}
  const rsi=100-100/(1+(g/(ls||.0001)));
  const ml=ema(cls,12)-ema(cls,26),hist=ml-ema(cls.slice(-9),3);
  const sm=avg(cls.slice(-20)),std=Math.sqrt(cls.slice(-20).reduce((a,b)=>a+(b-sm)**2,0)/20);
  const hi=Math.max(...c.slice(-14).map(x=>x.h)),lo=Math.min(...c.slice(-14).map(x=>x.l));
  const sk=((cls[n-1]-lo)/(hi-lo||1))*100;
  const trs=c.slice(-14).map((x,i,a)=>i===0?x.h-x.l:Math.max(x.h-x.l,Math.abs(x.h-a[i-1].c),Math.abs(x.l-a[i-1].c)));
  const atr=avg(trs);
  let pDM=0,mDM=0,trS=0;
  for(let i=n-14;i<n;i++){
    const u=i>0?Math.max(0,c[i].h-c[i-1].h):0,d=i>0?Math.max(0,c[i-1].l-c[i].l):0;
    if(u>d)pDM+=u;if(d>u)mDM+=d;
    trS+=i>0?Math.max(c[i].h-c[i].l,Math.abs(c[i].h-c[i-1].c),Math.abs(c[i].l-c[i-1].c)):c[i].h-c[i].l;
  }
  const adx=Math.min(99,Math.abs(pDM-mDM)/(pDM+mDM||1)*100*2);
  return{ema9:e9,ema21:e21,ema50:e50,rsi,macdLine:ml,hist,bbU:sm+2*std,bbL:sm-2*std,stochK:sk,atr,adx};
}
function calcSig(c,i){
  let s=0,r=[];
  if(i.rsi<30){s+=3;r.push("RSI sobrevendido");}else if(i.rsi>70){s-=3;r.push("RSI sobrecomprado");}
  else if(i.rsi<45){s-=1;r.push("RSI bajista");}else{s+=1;r.push("RSI alcista");}
  if(i.macdLine>0&&i.hist>0){s+=2;r.push("MACD alcista fuerte");}else if(i.macdLine<0&&i.hist<0){s-=2;r.push("MACD bajista fuerte");}
  if(i.ema9>i.ema21&&i.ema21>i.ema50){s+=2;r.push("EMAs alcistas");}else if(i.ema9<i.ema21&&i.ema21<i.ema50){s-=2;r.push("EMAs bajistas");}
  if(c[c.length-1].c<i.bbL){s+=2;r.push("Bajo BB inferior");}else if(c[c.length-1].c>i.bbU){s-=2;r.push("Sobre BB superior");}
  if(i.stochK<20){s+=2;r.push("Estoc. sobrevendido");}else if(i.stochK>80){s-=2;r.push("Estoc. sobrecomprado");}
  if(i.adx>25){s=s>0?s+1:s-1;r.push("ADX "+i.adx.toFixed(0));}
  const b5=c.slice(-5).filter(x=>x.c>x.o).length;
  if(b5>=4){s+=1;r.push(b5+"/5 velas verdes");}else if(b5<=1){s-=1;r.push("Momentum bajista");}
  return{dir:s>=0?"COMPRA":"VENTA",conf:Math.min(96,45+Math.abs(s)*6).toFixed(0),reasons:r};
}
function calcSLTP(price,dir,atr){const d=(atr||price*.005)*1.5;return{sl:dir==="COMPRA"?price-d:price+d,tp:dir==="COMPRA"?price+d*2:price-d*2,dist:d};}
function calcTrend(c,i){
  const eu=i.ema9>i.ema21&&i.ema21>i.ema50,ed=i.ema9<i.ema21&&i.ema21<i.ema50;
  const vs=i.adx>40,st=i.adx>25;
  const tm={MINUTE:1,MINUTE_5:5,MINUTE_15:15,MINUTE_30:30,HOUR:60,HOUR_4:240,DAY:1440};
  const mins=(tm[TFS[tfIdx].v]||60)*(vs?20:st?12:6);
  const dur=mins<60?mins+"min":mins<1440?(mins/60).toFixed(0)+"h":(mins/1440).toFixed(1)+"d";
  if(eu&&i.macdLine>0)return{trend:"ALCISTA",color:"#10b981",icon:"📈",dur,str:vs?"Muy fuerte 🔥":st?"Moderada":"⚠ Débil"};
  if(ed&&i.macdLine<0)return{trend:"BAJISTA",color:"#ef4444",icon:"📉",dur,str:vs?"Muy fuerte 🔥":st?"Moderada":"⚠ Débil"};
  return{trend:"LATERAL",color:"#f59e0b",icon:"↔️",dur:"Indefinida",str:"Sin tendencia"};
}
function genC(base,n=80){
  const v=base>1000?base*.006:base>100?base*.004:base>1?base*.003:base*.002;
  let p=base*.986;
  const a=Array.from({length:n-1},()=>{const o=p,c=Math.max(o+(Math.random()-.48)*v,.00001);p=c;return{o,h:Math.max(o,c)+Math.random()*v*.3,l:Math.min(o,c)-Math.random()*v*.3,c};});
  a.push({o:p,h:Math.max(p,base),l:Math.min(p,base),c:base});return a;
}

// ── DRAW CHART ───────────────────────────────────────────────────────────────
function drawChart(cvId,h){
  const cv=document.getElementById(cvId);if(!cv||!candles||!ind)return;
  const W=cv.offsetWidth||600;cv.width=W;cv.height=h||300;
  const H=h||300,ctx=cv.getContext("2d");
  const PL=54,PR=14,PT=20,PB=20,ca=W-PL-PR,ch=H-PT-PB;
  const ps=candles.flatMap(c=>[c.h,c.l]);
  if(sltp){ps.push(sltp.sl,sltp.tp);}
  const mn=Math.min(...ps)*.9993,mx=Math.max(...ps)*1.0007,rng=mx-mn||1;
  const ty=p=>PT+ch*(1-(p-mn)/rng),cw=Math.max(2,ca/candles.length-1.5);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"#0d1525");bg.addColorStop(1,"#060a10");
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Grid
  for(let i=0;i<=8;i++){
    const f=i/8,y=PT+ch*f,p=mx-rng*f;
    ctx.strokeStyle="#1a2540";ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W-PR,y);ctx.stroke();
    ctx.fillStyle="#4a5568";ctx.font="9px monospace";ctx.textAlign="right";
    ctx.fillText(p.toFixed(asset.dig>3?4:asset.dig),PL-3,y+3.5);
  }
  if(sltp){
    ctx.strokeStyle="#ef444488";ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(PL,ty(sltp.sl));ctx.lineTo(W-PR,ty(sltp.sl));ctx.stroke();
    ctx.fillStyle="#ef4444cc";ctx.font="bold 9px sans-serif";ctx.textAlign="right";
    ctx.fillText("SL "+sltp.sl.toFixed(asset.dig>3?5:asset.dig),W-PR,ty(sltp.sl)-4);
    ctx.strokeStyle="#34d39988";
    ctx.beginPath();ctx.moveTo(PL,ty(sltp.tp));ctx.lineTo(W-PR,ty(sltp.tp));ctx.stroke();
    ctx.fillStyle="#34d399cc";ctx.fillText("TP "+sltp.tp.toFixed(asset.dig>3?5:asset.dig),W-PR,ty(sltp.tp)-4);
    ctx.setLineDash([]);
    if(mid){
      const buy=sig?.dir==="COMPRA";
      ctx.fillStyle=buy?"#10b98108":"#ef444408";ctx.fillRect(PL,Math.min(ty(mid),ty(sltp.tp)),ca,Math.abs(ty(mid)-ty(sltp.tp)));
      ctx.fillStyle="#ef444408";ctx.fillRect(PL,Math.min(ty(mid),ty(sltp.sl)),ca,Math.abs(ty(mid)-ty(sltp.sl)));
    }
  }
  ctx.fillStyle="#7c3aed06";ctx.fillRect(PL,ty(ind.bbU),ca,ty(ind.bbL)-ty(ind.bbU));
  ctx.strokeStyle="#7c3aed55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(PL,ty(ind.bbU));ctx.lineTo(W-PR,ty(ind.bbU));ctx.stroke();
  ctx.beginPath();ctx.moveTo(PL,ty(ind.bbL));ctx.lineTo(W-PR,ty(ind.bbL));ctx.stroke();
  ctx.setLineDash([]);
  [[ind.ema9,"#f59e0b",1.5],[ind.ema21,"#06b6d4",1.5],[ind.ema50,"#a78bfa",1]].forEach(([v,col,lw])=>{
    ctx.strokeStyle=col+"aa";ctx.lineWidth=lw;
    ctx.beginPath();ctx.moveTo(PL,ty(v));ctx.lineTo(W-PR,ty(v));ctx.stroke();
  });
  candles.forEach((c,i)=>{
    const x=PL+i*(ca/candles.length)+cw/2,bull=c.c>=c.o,col=bull?"#10b981":"#ef4444";
    ctx.strokeStyle=col;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,ty(c.h));ctx.lineTo(x,ty(c.l));ctx.stroke();
    ctx.fillStyle=col+"cc";ctx.fillRect(x-cw/2,ty(Math.max(c.o,c.c)),cw,Math.max(1,Math.abs(ty(c.o)-ty(c.c))));
  });
  if(sig){
    const buy=sig.dir==="COMPRA",n=candles.length;
    for(let i=2;i<n-1;i++){
      const rb=candles[i-1].c<candles[i-1].o&&candles[i].c>candles[i].o;
      const rs=candles[i-1].c>candles[i-1].o&&candles[i].c<candles[i].o;
      if(!rb&&!rs)continue;
      const x=PL+i*(ca/candles.length)+cw/2,sz=6;
      if(rb){const ay=ty(candles[i].l)+4+sz;ctx.fillStyle="#10b98166";ctx.shadowColor="#10b981";ctx.shadowBlur=4;ctx.beginPath();ctx.moveTo(x,ay-sz);ctx.lineTo(x-sz*.7,ay);ctx.lineTo(x+sz*.7,ay);ctx.closePath();ctx.fill();ctx.shadowBlur=0;}
      else{const ay=ty(candles[i].h)-4-sz;ctx.fillStyle="#ef444466";ctx.shadowColor="#ef4444";ctx.shadowBlur=4;ctx.beginPath();ctx.moveTo(x,ay+sz);ctx.lineTo(x-sz*.7,ay);ctx.lineTo(x+sz*.7,ay);ctx.closePath();ctx.fill();ctx.shadowBlur=0;}
    }
    const lc=candles[n-1],x=PL+(n-1)*(ca/candles.length)+cw/2,sz=16;
    if(buy){
      const ay=ty(lc.l)+8+sz;ctx.fillStyle="#10b981";ctx.shadowColor="#10b981";ctx.shadowBlur=16;
      ctx.beginPath();ctx.moveTo(x,ay-sz);ctx.lineTo(x-sz*.9,ay);ctx.lineTo(x+sz*.9,ay);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle="#10b981";ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.fillText("▲ BUY",x,ay+13);
    }else{
      const ay=ty(lc.h)-8-sz;ctx.fillStyle="#ef4444";ctx.shadowColor="#ef4444";ctx.shadowBlur=16;
      ctx.beginPath();ctx.moveTo(x,ay+sz);ctx.lineTo(x-sz*.9,ay);ctx.lineTo(x+sz*.9,ay);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle="#ef4444";ctx.font="bold 10px sans-serif";ctx.textAlign="center";ctx.fillText("▼ SELL",x,ay-5);
    }
  }
  const lc=candles[candles.length-1];
  ctx.strokeStyle="#ffffff22";ctx.lineWidth=1;ctx.setLineDash([2,4]);
  ctx.beginPath();ctx.moveTo(PL,ty(lc.c));ctx.lineTo(W-PR,ty(lc.c));ctx.stroke();ctx.setLineDash([]);
  const pc=sig?.dir==="COMPRA"?"#10b981":"#ef4444";
  ctx.fillStyle=pc;ctx.beginPath();ctx.roundRect(W-PR-74,ty(lc.c)-9,72,18,4);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 9px monospace";ctx.textAlign="center";
  ctx.fillText(lc.c.toFixed(asset.dig>3?5:asset.dig),W-PR-37,ty(lc.c)+4.5);
}

async function doAnalyze(silent=false){
  if(!sess)return;
  if(!silent){const btn=document.getElementById("btn-analyze");if(btn){btn.disabled=true;btn.textContent="⏳";}}
  const err=document.getElementById("err-bar");if(err)err.style.display="none";
  try{
    const mr=await fetch(PROXY+"/markets/"+asset.epic,{headers:getH()});
    if(!mr.ok)throw new Error("HTTP "+mr.status);
    const md=await mr.json();
    bid=md?.snapshot?.bid;ask=md?.snapshot?.offer;
    if(!bid)throw new Error("Activo no disponible.");
    mid=(bid+ask)/2;
    let cands;
    try{
      const pr=await fetch(PROXY+"/prices/"+asset.epic+"?resolution="+TFS[tfIdx].v+"&max=80",{headers:getH()});
      const pd=await pr.json();
      if(pd?.prices?.length>=10){
        cands=pd.prices.map(p=>({o:(p.openPrice.bid+p.openPrice.ask)/2,h:(p.highPrice.bid+p.highPrice.ask)/2,l:(p.lowPrice.bid+p.lowPrice.ask)/2,c:(p.closePrice.bid+p.closePrice.ask)/2}));
        cands[cands.length-1].c=mid;cands[cands.length-1].h=Math.max(cands[cands.length-1].h,mid);cands[cands.length-1].l=Math.min(cands[cands.length-1].l,mid);
      }else throw 0;
    }catch{cands=genC(mid,80);}
    candles=cands;ind=calcInd(cands);sig=calcSig(cands,ind);sltp=calcSLTP(mid,sig.dir,ind.atr);trendInfo=calcTrend(cands,ind);
    countdown=30;
    if(prevSig&&prevSig!==sig.dir)addAlert(sig.dir==="COMPRA"?"buy":"sell","🚨 "+asset.d+" → "+(sig.dir==="COMPRA"?"🟢 COMPRAR":"🔴 VENDER")+" @ "+fmt(mid));
    prevSig=sig.dir;
    await fetchAccount();await fetchPositions();
    render();
  }catch(e){if(!silent&&document.getElementById("err-bar")){document.getElementById("err-bar").textContent="❌ "+e.message;document.getElementById("err-bar").style.display="block";}}
  if(!silent){const btn=document.getElementById("btn-analyze");if(btn){btn.disabled=false;btn.textContent="⚡ Analizar";}}
}

async function openTrade(size,useSlTp){
  if(!sess||!sig||!mid)return;
  tradeLoading=true;renderModal();
  const direction=sig.dir==="COMPRA"?"BUY":"SELL";
  const body={epic:asset.epic,direction,size:parseFloat(size)};
  if(useSlTp&&sltp){body.stopLevel=parseFloat(sltp.sl.toFixed(asset.dig>3?5:asset.dig));body.profitLevel=parseFloat(sltp.tp.toFixed(asset.dig>3?5:asset.dig));}
  try{
    const r=await fetch(PROXY+"/positions",{method:"POST",headers:{...getH(),"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok)throw new Error(d.errorCode||d.error||"HTTP "+r.status);
    toast("✅ Posición abierta: "+direction+" "+size+" lotes de "+asset.d,"success");
    tradeModalOpen=false;
    await fetchPositions();await fetchAccount();
    render();
  }catch(e){toast("❌ Error: "+e.message,"error");}
  tradeLoading=false;
  if(tradeModalOpen)renderModal();
}
async function closeTrade(dealId){
  if(!sess)return;
  try{
    const r=await fetch(PROXY+"/positions/"+dealId,{method:"DELETE",headers:getH()});
    if(!r.ok){const d=await r.json();throw new Error(d.errorCode||"Error al cerrar");}
    toast("✅ Posición cerrada","success");
    await fetchPositions();await fetchAccount();render();
  }catch(e){toast("❌ "+e.message,"error");}
}

  ${tab==="risk"?`<div class="card">
    <div style="display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap">
      ${[{l:"Capital ($)",id:"r-cap",v:capital},{l:"Riesgo (%)",id:"r-risk",v:risk,step:.5,max:10},{l:"Apalancam.",id:"r-lev",v:leverage,min:1,max:500}].map(f=>`<div style="flex:1;min-width:80px"><label style="font-size:9px;color:#64748b;display:block;margin-bottom:2px">${f.l}</label><input type="number" id="${f.id}" value="${f.v}" oninput="updateRiskH()" style="width:100%;background:#162035;border:1px solid #1e2d45;border-radius:7px;padding:6px 8px;color:#fff;font-size:12px;box-sizing:border-box;outline:none"/></div>`).join("")}
    </div>
    <div id="risk-vals" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"></div>
  </div>`:""}
  ${tab==="positions"?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
      <div style="font-size:11px;font-weight:700;color:#e2e8f0">📂 Posiciones Abiertas</div>
      <button onclick="fetchPositions().then(render)" style="background:#162035;border:1px solid #1e2d45;border-radius:6px;padding:3px 7px;cursor:pointer;font-size:10px;color:#64748b">🔄</button>
    </div>
    ${positions.length===0?`<div style="text-align:center;padding:16px;color:#64748b;font-size:11px">📭 No hay posiciones abiertas</div>`
    :positions.map(p=>{const b=p.direction==="BUY";const pnl=mid?(b?(mid-p.level)*p.size:(p.level-mid)*p.size):0;return`
    <div class="pos-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <span style="font-size:11px;font-weight:700;color:${b?"#10b981":"#ef4444"}">${b?"▲ COMPRA":"▼ VENTA"} ${p.epic||asset.d}</span>
          <div style="font-size:9px;color:#64748b;margin-top:1px">Entrada: ${p.level?.toFixed(asset.dig>3?5:asset.dig)||"--"}</div>
        </div>
        <div style="font-size:14px;font-weight:800;color:${pnl>=0?"#10b981":"#ef4444"}">${pnl>=0?"+":""}${pnl.toFixed(2)}</div>
      </div>
      <button onclick="closeTrade('${p.dealId}')" style="width:100%;padding:6px;border-radius:7px;border:1px solid #ef444444;background:#7f1d1d22;color:#f87171;cursor:pointer;font-size:11px;font-weight:600">🔴 Cerrar posición</button>
    </div>`;}).join("")}
  </div>`:""}
  ${tab==="alerts"?`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:11px;font-weight:600;color:#e2e8f0">🔔 Alertas en tiempo real</div>
      <div onclick="toggleAlertsH()" style="width:34px;height:18px;background:${alertsOn?"#10b981":"#374151"};border-radius:9px;position:relative;cursor:pointer;transition:.3s"><div style="position:absolute;top:2px;left:${alertsOn?16:2}px;width:14px;height:14px;background:#fff;border-radius:7px;transition:.3s"></div></div>
    </div>
    <div style="max-height:180px;overflow-y:auto">
      ${alertLog.length===0?`<div style="text-align:center;color:#64748b;font-size:10px;padding:12px">Activa alertas para señales</div>`
      :alertLog.slice(0,20).map(a=>`<div class="alert-item" style="background:${{buy:"#065f4622",sell:"#7f1d1d22",warn:"#78350f22",info:"#1e1b4b22"}[a.type]||"#162035"};border:1px solid ${{buy:"#10b98133",sell:"#ef444433",warn:"#f59e0b33",info:"#6366f133"}[a.type]||"#1e2d45"}"><span style="font-size:8px;color:#64748b;min-width:42px">${a.time}</span><span style="font-size:10px;color:#e2e8f0;flex:1">${a.msg}</span></div>`).join("")}
    </div>
  </div>`:""}
  ${tab==="ai"?`<div class="card">
    <button id="ai-btn" onclick="doAIHandler()" style="width:100%;padding:10px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:700;background:${aiLoading?"#374151":"linear-gradient(135deg,#7c3aed,#6366f1)"};color:#fff;margin-bottom:10px">
      ${aiLoading?"⏳ Analizando...":"🤖 Análisis IA + Noticias"}
    </button>
    <div id="ai-result-box">${aiResult?`<div style="background:#162035;border-radius:9px;padding:11px;font-size:11px;color:#e2e8f0;line-height:1.9;white-space:pre-wrap;max-height:300px;overflow-y:auto">${aiResult}</div>`:`<div style="text-align:center;color:#4b5563;font-size:10px;padding:12px">IA interpreta el gráfico y busca noticias</div>`}</div>
  </div>`:""}
  `:`<div style="text-align:center;padding:32px 14px"><div style="font-size:44px;margin-bottom:8px">📡</div><p style="font-size:13px;color:#64748b">Selecciona un activo y presiona <b style="color:#6366f1">⚡ Analizar</b></p></div>`}
  <div style="margin-top:10px;background:#0a0f18;border-radius:7px;padding:7px;font-size:9px;color:#92400e;border:1px solid #78350f44;text-align:center">⚠️ CFDs implican alto riesgo. No es asesoramiento financiero.</div>`;
  setTimeout(()=>{updateRiskH();},50);
}

function updateRiskH(){
  capital=parseFloat(document.getElementById("r-cap")?.value)||1000;
  risk=parseFloat(document.getElementById("r-risk")?.value)||2;
  leverage=parseFloat(document.getElementById("r-lev")?.value)||30;
  const grid=document.getElementById("risk-vals");if(!grid||!sltp)return;
  const ra=capital*(risk/100),ga=ra*2,ps=(ra/sltp.dist).toFixed(4),mg=(parseFloat(ps)*(mid||1)/leverage).toFixed(2);
  const slP=(sltp.dist/asset.pip).toFixed(0),tpP=((sltp.dist*2)/asset.pip).toFixed(0);
  grid.innerHTML=[{i:"🛑",v:"$"+ra.toFixed(2),l:"Pérdida",c:"#ef4444"},{i:"🎯",v:"$"+ga.toFixed(2),l:"Ganancia",c:"#10b981"},{i:"📊",v:ps,l:"Lotes",c:"#f59e0b"}].map(x=>`<div style="background:#162035;border-radius:8px;padding:8px;text-align:center;border:1px solid #1e2d45"><div style="font-size:14px">${x.i}</div><div style="font-size:12px;font-weight:700;color:${x.c};margin:2px 0">${x.v}</div><div style="font-size:8px;color:#64748b">${x.l}</div></div>`).join("");
}

function setCatH(c){cat=c;if(ASSETS[c]?.length>0)asset=ASSETS[c][0];candles=null;prevSig=null;render();}
function setAssetH(e){asset=ALL.find(a=>a.epic===e)||asset;candles=null;prevSig=null;render();}
function setTFH(i){tfIdx=i;candles=null;prevSig=null;render();}
function setTabH(t){tab=t;render();if(t==="chart")setTimeout(()=>drawChart("cv-main",view==="pc"?chartH:280),60);}
function toggleFavH(e){const i=favorites.indexOf(e);i>=0?favorites.splice(i,1):favorites.push(e);toast(favorites.includes(e)?"★ "+e+" favorito":"☆ "+e+" eliminado","info");render();}
function doLogout(){clearInterval(liveTimer);clearInterval(countTimer);sess=null;candles=null;alertsOn=false;prevSig=null;balance=null;positions=[];render();}
function toggleAlertsH(){alertsOn=!alertsOn;addAlert("info",alertsOn?"🔔 Alertas activadas":"🔕 Desactivadas");render();}

async function doAIHandler(){
  if(!ind||!sig||!mid)return;
  aiLoading=true;render();
  const n=candles?.length||0,lc=candles?.[n-1],pc=candles?.[n-2];
  let patterns=[];
  if(lc&&pc){
    const body=Math.abs(lc.c-lc.o),range=lc.h-lc.l;
    if(body<range*.1)patterns.push("Doji");
    if(Math.min(lc.o,lc.c)-lc.l>body*2)patterns.push("Hammer");
    if(lc.h-Math.max(lc.o,lc.c)>body*2)patterns.push("Shooting Star");
    if(body>Math.abs(pc.c-pc.o)*1.5)patterns.push(lc.c>lc.o?"Vela alcista fuerte":"Vela bajista fuerte");
    const b5=candles.slice(-5).filter(c=>c.c>c.o).length;
    if(b5>=4)patterns.push(b5+"/5 velas verdes");if(b5<=1)patterns.push((5-b5)+"/5 velas rojas");
  }
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1400,tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:"Eres experto trader en Capital.com. Analiza en español:\nActivo: "+asset.d+" ("+asset.name+") Capital.com "+(sess.demo?"DEMO":"LIVE")+"\nPrecio: Bid="+fmt(bid)+" Ask="+fmt(ask)+" Mid="+fmt(mid)+" TF:"+TFS[tfIdx].l+"\nTendencia:"+JSON.stringify(trendInfo)+"\nPatrones:"+patterns.join(", ")+"\nRSI:"+ind.rsi.toFixed(2)+" MACD:"+ind.macdLine.toFixed(5)+" ADX:"+ind.adx.toFixed(1)+" Estoc:"+ind.stochK.toFixed(1)+"\nSeñal:"+sig.dir+" ("+sig.conf+"%) SL:"+fmt(sltp?.sl)+" TP:"+fmt(sltp?.tp)+"\n1.🔍 Noticias HOY de "+asset.name+"\n2.📊 Interpreta el gráfico y patrones\n3.✅ COMPRAR/VENDER/ESPERAR con confianza\n4.⏱ Duración estimada\n5.📍 3 soportes y 3 resistencias exactos\n6.🎯 Cómo ejecutar en Capital.com\n7.⚠️ Nivel riesgo: BAJO/MEDIO/ALTO\nFormato profesional."}]})});
    const d=await r.json();aiResult=d.content?.filter(b=>b.type==="text").map(b=>b.text).join("\n")||"Sin respuesta";
  }catch(e){aiResult="❌ Error: "+e.message;}
  aiLoading=false;render();
}

render();
setView(window.innerWidth>768?"pc":"phone");
</script>
