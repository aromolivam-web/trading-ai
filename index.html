/* ===== CANDLE PATTERN DETECTION ===== */
function detectPatterns(c){
  if(!c||c.length<3)return[];
  const pts=[];
  const n=c.length;
  const L=c[n-1],P=c[n-2],P2=c[n-3];
  const body=x=>Math.abs(x.c-x.o);
  const rng=x=>Math.max(x.h-x.l,0.000001);
  const upW=x=>x.h-Math.max(x.o,x.c);
  const dnW=x=>Math.min(x.o,x.c)-x.l;
  const bull=x=>x.c>x.o;
  const bear=x=>x.c<x.o;

  // Hammer (bullish reversal)
  if(dnW(L)>body(L)*2.5&&upW(L)<body(L)*0.5&&rng(L)>0)
    pts.push({score:2,desc:'🔨 Martillo alcista'});
  // Shooting star (bearish reversal)
  if(upW(L)>body(L)*2.5&&dnW(L)<body(L)*0.5&&rng(L)>0)
    pts.push({score:-2,desc:'⭐ Estrella fugaz bajista'});
  // Bullish engulfing
  if(bear(P)&&bull(L)&&L.o<=P.c&&L.c>=P.o&&body(L)>body(P))
    pts.push({score:3,desc:'🟢 Envolvente alcista'});
  // Bearish engulfing
  if(bull(P)&&bear(L)&&L.o>=P.c&&L.c<=P.o&&body(L)>body(P))
    pts.push({score:-3,desc:'🔴 Envolvente bajista'});
  // Doji
  if(body(L)<rng(L)*0.08)
    pts.push({score:0,desc:'🔸 Doji - Indecisión'});
  // Bullish pin bar
  if(dnW(L)>rng(L)*0.62&&bull(L))
    pts.push({score:2,desc:'📌 Pin bar alcista'});
  // Bearish pin bar
  if(upW(L)>rng(L)*0.62&&bear(L))
    pts.push({score:-2,desc:'📌 Pin bar bajista'});
  // 3 consecutive bull
  if(bull(L)&&bull(P)&&bull(P2)&&L.c>P.c&&P.c>P2.c)
    pts.push({score:2,desc:'📈 3 velas alcistas consecutivas'});
  // 3 consecutive bear
  if(bear(L)&&bear(P)&&bear(P2)&&L.c<P.c&&P.c<P2.c)
    pts.push({score:-2,desc:'📉 3 velas bajistas consecutivas'});
  // Morning star
  if(bear(P2)&&body(P)<rng(P)*0.25&&bull(L)&&L.c>(P2.o+P2.c)/2)
    pts.push({score:3,desc:'🌅 Estrella de la mañana'});
  // Evening star
  if(bull(P2)&&body(P)<rng(P)*0.25&&bear(L)&&L.c<(P2.o+P2.c)/2)
    pts.push({score:-3,desc:'🌆 Estrella de la tarde'});
  // Bullish Harami
  if(bear(P)&&bull(L)&&L.o>P.c&&L.c<P.o&&body(L)<body(P)*0.6)
    pts.push({score:1,desc:'🔆 Harami alcista'});
  // Bearish Harami
  if(bull(P)&&bear(L)&&L.o<P.c&&L.c>P.o&&body(L)<body(P)*0.6)
    pts.push({score:-1,desc:'🔅 Harami bajista'});
  return pts;
}

/* ===== TA CALCULATIONS ===== */
function calcInd(c){
  const cls=c.map(x=>x.c),n=cls.length;
  const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;

  // EMA (proper seeded)
  const ema=(d,p)=>{
    const per=Math.min(p,d.length);
    const k=2/(per+1);
    let e=d.slice(0,per).reduce((a,b)=>a+b,0)/per;
    for(let i=per;i<d.length;i++)e=d[i]*k+e*(1-k);
    return e;
  };
  // RMA (Wilder)
  const rma=(d,p)=>{
    let av=d.slice(0,p).reduce((a,b)=>a+b,0)/p;
    for(let i=p;i<d.length;i++)av=(av*(p-1)+d[i])/p;
    return av;
  };

  const e9=ema(cls,9),e21=ema(cls,21),e50=ema(cls,Math.min(50,n-1));

  // RSI (Wilder smoothing)
  const changes=cls.slice(1).map((v,i)=>v-cls[i]);
  const gains=changes.map(d=>d>0?d:0);
  const losses=changes.map(d=>d<0?-d:0);
  const rsiPer=Math.min(14,gains.length);
  const avgGain=rma(gains,rsiPer),avgLoss=rma(losses,rsiPer);
  const rsi=100-100/(1+(avgGain/(avgLoss||0.0001)));

  // MACD + histogram acceleration
  const macdLine=ema(cls,12)-ema(cls,26);
  const signalLine=ema(cls.slice(-9),9);
  const hist=macdLine-signalLine;
  const prevCls=cls.slice(0,-1);
  const prevMacd=prevCls.length>=26?ema(prevCls,12)-ema(prevCls,26):macdLine;
  const prevSig=prevCls.length>=9?ema(prevCls.slice(-9),9):signalLine;
  const prevHist=prevMacd-prevSig;

  // ATR
  const tr=c.slice(-14).map((x,i,a)=>i===0?x.h-x.l:Math.max(x.h-x.l,Math.abs(x.h-a[i-1].c),Math.abs(x.l-a[i-1].c)));
  const atr=avg(tr);

  // Bollinger Bands
  const bbPer=Math.min(20,n);
  const bbCls=cls.slice(-bbPer);
  const sm=avg(bbCls);
  const std=Math.sqrt(avg(bbCls.map(x=>Math.pow(x-sm,2))));
  const bbu=sm+2*std,bbl=sm-2*std;
  const bbWidth=(bbu-bbl)/(sm||1)*100;

  // Stochastic %K + crossover
  const hi14=Math.max(...c.slice(-14).map(x=>x.h));
  const lo14=Math.min(...c.slice(-14).map(x=>x.l));
  const stochK=((cls[n-1]-lo14)/(hi14-lo14||1))*100;
  let prevK=stochK;
  if(c.length>=15){
    const ph=Math.max(...c.slice(-15,-1).map(x=>x.h));
    const pl=Math.min(...c.slice(-15,-1).map(x=>x.l));
    prevK=((cls[n-2]-pl)/(ph-pl||1))*100;
  }

  // ADX (proper DM)
  const adxP=Math.min(14,c.length-1);
  let pDM=0,mDM=0,trSum=0;
  for(let i=c.length-adxP;i<c.length;i++){
    if(i<=0)continue;
    const up=c[i].h-c[i-1].h,dn=c[i-1].l-c[i].l;
    if(up>dn&&up>0)pDM+=up;
    if(dn>up&&dn>0)mDM+=dn;
    trSum+=Math.max(c[i].h-c[i].l,Math.abs(c[i].h-c[i-1].c),Math.abs(c[i].l-c[i-1].c));
  }
  const diP=trSum>0?(pDM/trSum)*100:0;
  const diM=trSum>0?(mDM/trSum)*100:0;
  const dx=(diP+diM)>0?Math.abs(diP-diM)/(diP+diM)*100:0;
  const adx=Math.min(100,dx);

  // Williams %R
  const willR=-((hi14-cls[n-1])/(hi14-lo14||1))*100;

  // ROC 10
  const rocP=Math.min(10,n-1);
  const roc=((cls[n-1]-cls[n-1-rocP])/cls[n-1-rocP])*100;

  return{ema9:e9,ema21:e21,ema50:e50,rsi,macd:macdLine,signal:signalLine,hist,prevHist,
    bbu,bbl,bbWidth,bbSm:sm,stochK,prevStochK:Math.max(0,Math.min(100,prevK)),
    atr,adx,diPlus:diP,diMinus:diM,willR,roc};
}

function calcSig(c,ind,sr=[]){
  let s=0,r=[];
  const n=c.length,last=c[n-1],lp=last.c;

  // ===== RSI =====
  if(ind.rsi<25){s+=4;r.push('RSI extremo sobrevendido ⚡');}
  else if(ind.rsi<35){s+=2;r.push('RSI sobrevendido 🟢');}
  else if(ind.rsi>75){s-=4;r.push('RSI extremo sobrecomprado ⚡');}
  else if(ind.rsi>65){s-=2;r.push('RSI sobrecomprado 🔴');}
  else if(ind.rsi<45){s+=1;r.push('RSI zona alcista');}
  else if(ind.rsi>55){s-=1;r.push('RSI zona bajista');}

  // ===== RSI Divergence =====
  if(n>=20){
    const rec=c.slice(-20);
    const recentHigh5=rec.slice(-5).reduce((m,x)=>Math.max(m,x.h),-Infinity);
    const olderHigh15=rec.slice(0,15).reduce((m,x)=>Math.max(m,x.h),-Infinity);
    const recentLow5=rec.slice(-5).reduce((m,x)=>Math.min(m,x.l),Infinity);
    const olderLow15=rec.slice(0,15).reduce((m,x)=>Math.min(m,x.l),Infinity);
    if(recentHigh5>olderHigh15&&ind.rsi<62){s-=1;r.push('⚠️ Divergencia bajista RSI');}
    if(recentLow5<olderLow15&&ind.rsi>38){s+=1;r.push('💡 Divergencia alcista RSI');}
  }

  // ===== MACD =====
  const macdCrossUp=ind.hist>0&&ind.prevHist<=0;
  const macdCrossDown=ind.hist<0&&ind.prevHist>=0;
  const histAccel=Math.abs(ind.hist)>Math.abs(ind.prevHist);
  if(macdCrossUp){s+=3;r.push('✅ Cruce MACD alcista (señal fuerte)');}
  else if(macdCrossDown){s-=3;r.push('❌ Cruce MACD bajista (señal fuerte)');}
  else if(ind.macd>0&&ind.hist>0){s+=histAccel?2:1;r.push('MACD alcista'+(histAccel?' acelerando 🚀':''));}
  else if(ind.macd<0&&ind.hist<0){s-=histAccel?2:1;r.push('MACD bajista'+(histAccel?' acelerando 📉':''));}

  // ===== Stochastic =====
  const stCrossUp=ind.stochK>20&&ind.prevStochK<=20;
  const stCrossDown=ind.stochK<80&&ind.prevStochK>=80;
  if(stCrossUp){s+=2;r.push('✅ Estocástico saliendo de sobrevendido');}
  else if(stCrossDown){s-=2;r.push('❌ Estocástico saliendo de sobrecomprado');}
  else if(ind.stochK<20){s+=2;r.push('Estocástico sobrevendido 🟢');}
  else if(ind.stochK>80){s-=2;r.push('Estocástico sobrecomprado 🔴');}

  // ===== Williams %R =====
  if(ind.willR<-80){s+=1;r.push('Williams %R sobrevendido');}
  else if(ind.willR>-20){s-=1;r.push('Williams %R sobrecomprado');}

  // ===== ADX =====
  if(ind.adx>25){
    const tDir=ind.diPlus>ind.diMinus?1:-1;
    const strength=Math.min(3,Math.floor(ind.adx/15));
    s+=tDir*strength;
    r.push(`ADX ${ind.adx.toFixed(0)} - tendencia ${ind.diPlus>ind.diMinus?'alcista 📈':'bajista 📉'} fuerte`);
  }

  // ===== EMA Alignment =====
  if(ind.ema9>ind.ema21&&ind.ema21>ind.ema50){s+=3;r.push('EMAs alcistas perfectamente alineadas ✅');}
  else if(ind.ema9<ind.ema21&&ind.ema21<ind.ema50){s-=3;r.push('EMAs bajistas perfectamente alineadas ❌');}
  else if(ind.ema9>ind.ema21){s+=1;r.push('EMA9 > EMA21 (alcista)');}
  else if(ind.ema9<ind.ema21){s-=1;r.push('EMA9 < EMA21 (bajista)');}

  // Price vs EMA9
  if(lp>ind.ema9*1.0005){s+=1;r.push('Precio sobre EMA9 (impulso)');}
  else if(lp<ind.ema9*0.9995){s-=1;r.push('Precio bajo EMA9 (presión)');}

  // ===== Bollinger Bands =====
  if(lp<=ind.bbl){s+=2;r.push('🟢 Precio en banda inferior BB (rebote)');}
  else if(lp>=ind.bbu){s-=2;r.push('🔴 Precio en banda superior BB (rechazo)');}
  else if(lp<(ind.bbl+ind.bbSm)/2){s+=1;r.push('Precio en zona baja BB');}
  else if(lp>(ind.bbu+ind.bbSm)/2){s-=1;r.push('Precio en zona alta BB');}
  if(ind.bbWidth<0.8){r.push('⚡ BB Squeeze - movimiento explosivo inminente');}

  // ===== ROC =====
  if(ind.roc>0.5){s+=1;r.push(`ROC positivo +${ind.roc.toFixed(2)}%`);}
  else if(ind.roc<-0.5){s-=1;r.push(`ROC negativo ${ind.roc.toFixed(2)}%`);}

  // ===== Candle Patterns =====
  const patterns=detectPatterns(c);
  patterns.forEach(p=>{if(p.score!==0){s+=p.score;r.push(p.desc);}});

  // ===== Price Structure HH/HL or LH/LL =====
  if(n>=6){
    const h1=Math.max(c[n-2].h,c[n-3].h);
    const h2=Math.max(c[n-4].h,c[n-5].h);
    const l1=Math.min(c[n-2].l,c[n-3].l);
    const l2=Math.min(c[n-4].l,c[n-5].l);
    if(c[n-1].h>h1&&h1>h2&&c[n-1].l>l1&&l1>l2){s+=2;r.push('📈 Estructura HH/HL alcista (tendencia)');}
    if(c[n-1].l<l1&&l1<l2&&c[n-1].h<h1&&h1<h2){s-=2;r.push('📉 Estructura LH/LL bajista (tendencia)');}
  }

  // ===== Momentum (last 5 candles) =====
  const bull5=c.slice(-5).filter(x=>x.c>x.o).length;
  if(bull5>=4){s+=1;r.push(`Momentum alcista (${bull5}/5 🟢)`);}
  else if(bull5<=1){s-=1;r.push(`Momentum bajista (${5-bull5}/5 🔴)`);}

  // ===== S&R Proximity + Bounce =====
  if(sr.length&&n>0){
    const range20=Math.max(...c.slice(-20).map(x=>x.h))-Math.min(...c.slice(-20).map(x=>x.l));
    const tol=range20*0.008;
    const ns=sr.find(v=>v.type==='S'&&Math.abs(lp-v.price)<=tol);
    const nr=sr.find(v=>v.type==='R'&&Math.abs(lp-v.price)<=tol);
    if(ns){const sc=Math.min(4,ns.strength*1.5);s+=sc;r.push(`🟢 En soporte fuerte: ${fmt(ns.price)} (×${ns.strength})`);}
    if(nr){const sc=Math.min(4,nr.strength*1.5);s-=sc;r.push(`🔴 En resistencia fuerte: ${fmt(nr.price)} (×${nr.strength})`);}
    // Bounce confirmation
    if(n>=3){
      const pp=c[n-3].c;
      const bns=sr.find(v=>v.type==='S'&&Math.abs(pp-v.price)<=tol*2);
      if(bns&&lp>bns.price*1.001){s+=2;r.push(`🚀 Rebote confirmado desde soporte ${fmt(bns.price)}`);}
      const bnr=sr.find(v=>v.type==='R'&&Math.abs(pp-v.price)<=tol*2);
      if(bnr&&lp<bnr.price*0.999){s-=2;r.push(`⬇️ Rechazo confirmado desde resistencia ${fmt(bnr.price)}`);}
    }
  }

  // ===== ATR filter =====
  if(mid&&ind.atr){
    const atrPct=ind.atr/mid*100;
    if(atrPct>4){r.push(`⚠️ Alta volatilidad ATR ${atrPct.toFixed(2)}%`);}
    else if(atrPct<0.05){r.push('😴 Mercado sin movimiento');}
  }

  const absScore=Math.abs(s);
  const conf=Math.min(97,35+absScore*4.5);
  const strength=absScore>=12?'FUERTE':absScore>=6?'MODERADO':'DÉBIL';
  const emerging=absScore>=2&&absScore<5;

  return{dir:s>=0?"COMPRA":"VENTA",conf:conf.toFixed(0),score:s,reasons:r,
    patterns,strength,emerging};
}

function calcSLTP(price,dir,atr){
  const d=(atr||price*0.005)*1.5;
  return{sl:dir==="COMPRA"?price-d:price+d,tp:dir==="COMPRA"?price+d*2:price-d*2,dist:d};
}
function calcTrend(c,ind){
  if(ind.ema9>ind.ema21&&ind.ema21>ind.ema50)
    return{trend:"ALCISTA",color:"#10b981",bg:"#021a10",icon:"📈",str:"Tendencia ALCISTA",sub:"EMAs alineadas hacia arriba"};
  if(ind.ema9<ind.ema21&&ind.ema21<ind.ema50)
    return{trend:"BAJISTA",color:"#ef4444",bg:"#1a0202",icon:"📉",str:"Tendencia BAJISTA",sub:"EMAs alineadas hacia abajo"};
  return{trend:"LATERAL",color:"#f59e0b",bg:"#1a0f02",icon:"↔️",str:"Mercado LATERAL",sub:"Sin tendencia definida"};
}
function calcSR(c){
  if(!c||c.length<15)return[];
  const sr=[];
  for(let i=3;i<c.length-3;i++){
    if(c[i].h>=c[i-1].h&&c[i].h>=c[i-2].h&&c[i].h>=c[i+1].h&&c[i].h>=c[i+2].h)
      sr.push({price:c[i].h,type:'R',idx:i});
    if(c[i].l<=c[i-1].l&&c[i].l<=c[i-2].l&&c[i].l<=c[i+1].l&&c[i].l<=c[i+2].l)
      sr.push({price:c[i].l,type:'S',idx:i});
  }
  const merged=[];
  const range=Math.max(...c.map(x=>x.h))-Math.min(...c.map(x=>x.l));
  const tol=range*0.003;
  for(const lv of sr){
    const ex=merged.find(m=>Math.abs(m.price-lv.price)<=tol);
    if(ex){ex.strength++;ex.price=(ex.price*(ex.strength-1)+lv.price)/ex.strength;}
    else merged.push({...lv,strength:1});
  }
  return merged.filter(m=>m.strength>=2).sort((a,b)=>b.strength-a.strength).slice(0,8);
}
function genC(base,n=100){
  const v=base>1000?base*.004:base>1?base*.003:base*.002;
  let p=base*.986;
  const a=Array.from({length:n-1},()=>{
    const o=p,c=Math.max(o+(Math.random()-.48)*v,.00001);p=c;
    return{o,h:Math.max(o,c)+Math.random()*v*3,l:Math.min(o,c)-Math.random()*v*3,c};
  });
  a.push({o:p,h:Math.max(p,base),n:Math.min(p,base),c:base});
  return a;
}
function addTimes(cands){
  const now2=Math.floor(Date.now()/1000),secs=TF_SECS[tfIdx]||3600;
  return cands.map((c,i)=>({...c,time:now2-(cands.length-1-i)*secs}));
}
function parseCapTime(s){
  if(!s)return null;
  const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+):(\d+)/);
  if(!m)return null;
  return Math.floor(new Date(+m[1],+m[2]-1,+m[3],+m[4],+m[5],+m[6]).getTime()/1000);
}

  });

    wickUpColor:'#10b981',wickDownColor:'#ef4444',

function updateChart(){
  if(!lwChart||!lwCandle||!candles||!candles.length)return;
  const data=candles.map((c,i)=>({
    time:c.time||(Math.floor(Date.now()/1000)-(candles.length-1-i)*(TF_SECS[tfIdx]||3600)),
    open:c.o,high:c.h,low:c.l,close:c.c
  }));
  for(let i=1;i<data.length;i++){
    if(data[i].time<=data[i-1].time)data[i].time=data[i-1].time+1;
  }
  try{lwCandle.setData(data);}catch(e){console.warn('chart setData:',e);return;}

  // Clear old price lines
  lwPriceLines.forEach(pl=>{try{lwCandle.removePriceLine(pl);}catch{}});
  lwPriceLines=[];

  // SL/TP lines
  if(sltp){
    try{
      lwPriceLines.push(lwCandle.createPriceLine({price:sltp.sl,color:'#ef4444bb',lineWidth:1,
        lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:true,title:'SL'}));
      lwPriceLines.push(lwCandle.createPriceLine({price:sltp.tp,color:'#10b981bb',lineWidth:1,
        lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:true,title:'TP'}));
    }catch{}
  }

  // S&R lines
  if(window._sr){
    window._sr.forEach(lv=>{
      try{
        lwPriceLines.push(lwCandle.createPriceLine({
          price:lv.price,
          color:lv.type==='R'?'#ef444470':'#10b98170',
          lineWidth:Math.min(2,lv.strength),
          lineStyle:LightweightCharts.LineStyle.Dashed,
          axisLabelVisible:true,
          title:(lv.type==='R'?'R':'S')+lv.strength
        }));
      }catch{}
    });
  }

  // Signal markers: predictive (emerging) + confirmed
  if(sig&&data.length>=2){
    const markers=[];
    const last=data[data.length-1];

    if(sig.emerging&&data.length>=3){
      // Predictive arrow on 2nd-to-last candle
      markers.push({
        time:data[data.length-2].time,
        position:sig.dir==="COMPRA"?'belowBar':'aboveBar',
        color:'#f59e0b',shape:'circle',
        text:'⚡ '+sig.conf+'%',s:size:1
      });
    }

    // Main signal arrow on last candle
    markers.push({
      time:last.time,
      position:sig.dir==="COMPRA"?'belowBar':'aboveBar',
      color:sig.dir==="COMPRA"?'#10b981':'#ef4444',
      shape:sig.dir==="COMPRA"?'arrowUp':'arrowDown',
      text:(sig.dir==="COMPRA"?'◲ BUY':''▼ SELL')+' '+sig.conf+'%',
      size:sig.strength==='FUERTE'?3:2
    });
    try{lwCandle.setMarkers(markers);}catch{}
  }

  try{lwChart.timeScale().fitContent();}catch{}
}

  try{

    serverStatus='warm';
    sess={cst:d.cst,token:d.token,base:d.base||'',apiKey:ak,email:em,pass:pw,demo:dm};
  }catch(e){
    clr();

async function doAnalyze(silent=false){
  if(!sess)return;
  if(!silent){
    const btn=document.getElementById("btn-analyze");
    if(btn){btn.disabled=true;btn.innerHTML='<span style="display:inline-block;animation:spin .8s linear infinite">🔄</span> Analizando...';}
    const eb=document.getElementById("err-bar");
    if(eb)eb.style.display='none';
  }
  try{
    const mr=await fetch(PROXY+"/markets/"+asset.epic,{headers:getH()});
    if(!mr.ok)throw new Error("HTTP "+mr.status);
    const md=await mr.json();
    bid=md?.snapshot?.bid||md?.snapshot?.offer;
    ask=md?.snapshot?.ask||md?.snapshot?.offer||bid;
    if(!bid)throw new Error("Activo no disponible o mercado cerrado");
    mid=(bid+ask)/2;

    let cands;
    try{
      const pr=await fetch(PROXY+"/prices/"+asset.epic+"?resolution="+TFS[tfIdx].v+"&max=100",{headers:getH()});
      const pd=await pr.json();
      if(pd?.prices?.length>=10){
        cands=pd.prices.map((p,i)=>({
          o:(p.openPrice.bid+p.openPrice.ask)/2,
          h:(p.highPrice.bid+p.highPrice.ask)/2,
          l:(p.lowPrice.bid+p.lowPrice.ask)/2,
          c:(p.closePrice.bid+p.closePrice.ask)/2,
          time:parseCapTime(p.snapshotTime)||(Math.floor(Date.now()/1000)-(pd.prices.length-1-i)*TF_SECS[tfIdx])
        }));
      }else throw new Error("Datos insuficientes");
    }catch{cands=addTimes(genC(mid,100));}

    candles=cands;
    ind=calcInd(candles);
    const sr=calcSR(candles);
    window._sr=sr;
    sig=calcSig(candles,ind,sr);
    sltp=calcSLTP(mid,sig.dir,ind.atr);
    trendInfo=calcTrend(candles,ind);
    countdown=30;

    if(prevSig&&prevSig!==sig.dir)
      addAlert(sig.dir==="COMPRA"?"buy":"sell","📊 "+asset.d+" — "+(sig.dir==="COMPRA"?"🟢 COMPRA":"🔴 VENTA")+" @ "+fmt(mid));
    prevSig=sig.dir;prevScore=sig.score;

    await fetchAccount();
    await fetchPositions();

    // Update only dynamic sections (no layout rebuild)
    updateDynamicSections();
    // Update chart data only (no rebuild)
    updateChart();

    // Update header
    const hdr=document.getElementById('hdr-section');
    if(hdr)hdr.innerHTML=renderHeader();
  }catch(e){
    if(!silent){
      const eb=document.getElementById("err-bar");
      if(eb){eb.textContent="❌ "+e.message;eb.style.display="block";}
    }
  }
  if(!silent){
    const btn=document.getElementById("btn-analyze");
    if(btn){btn.disabled=false;btn.innerHTML='🔍 Analizar';}
  }
}

async function openTrade(size,useSLTP){
  if(!sess||!sig||!mid)return;
  tradeLoading=true;renderModal();
  const direction=sig.dir==="COMPRA"?"BUY":"SELL";
  const body={
    epic:asset.epic,
    direction,
    size:parseFloat(parseFloat(size).toFixed(2)),
    forceOpen:true,
    guaranteedStop:false,
    trailingStop:false
  };
  if(useSLTP&&sltp){
    body.stopLevel=parseFloat(sltp.sl.toFixed(asset.dig>3?asset.dig:2));
    body.profitLevel=parseFloat(sltp.tp.toFixed(asset.dig>3?asset.dig:2));
  }
  try{
    const r=await fetch(PROXY+"/positions",{
      method:"POST",
      headers:{...getH(),"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.errorCode||d.error||d.message||"HTTP "+r.status);
    toast("✅ Posición abierta: "+direction+" "+size+" "+asset.d,"success");
    addAlert(direction==="BUY"?"buy":"sell","🏦 Posición abierta "+direction+" "+size+" "+asset.d+" @ "+fmt(mid));
    tradeModalOpen=false;
    await fetchPositions();await fetchAccount();
    updateDynamicSections();
    const hdr=document.getElementById('hdr-section');
    if(hdr)hdr.innerHTML=renderHeader();
  }catch(e){toast("❌ Error al abrir: "+e.message,"error");}
  tradeLoading=false;renderModal();
}

async function closeTrade(dealId){
  if(!sess)return;
  try{
    const r=await fetch(PROXY+"/positions/"+dealId,{method:"DELETE",headers:getH()});
    if(!r.ok){const d=await r.json();throw new Error(d.errorCode||d.error||"Error al cerrar");}
    toast("✅ Posición cerrada","success");
    await fetchPositions();await fetchAccount();
    updateDynamicSections();
    const hdr=document.getElementById('hdr-section');
    if(hdr)hdr.innerHTML=renderHeader();
  }catch(e){toast("❌ "+e.message,"error");}
}

function calcLivePL(pos){
  if(!bid&&!ask)return pos.profit||0;
  const entryPrice=pos.openLevel||pos.openPrice||pos.level||0;
  if(!entryPrice)return pos.profit||0;
  const currentPrice=pos.direction==='BUY'?(bid||mid):(ask||mid);
  const dir=pos.direction==='BUY'?1:-1;
  const diff=(currentPrice-entryPrice)*dir;
  // Use API profit if available and close to our estimate; otherwise estimate
  if(pos.profit!=null&&Math.abs(pos.profit)>0)return pos.profit;
  return diff*(pos.size||0.1)*(asset.dig>=5?100000:1);
}

function startTimers(){
  clearInterval(liveTimer);clearInterval(countTimer);clearInterval(plTimer);
  // Main analysis every 30s (no layout rebuild)
  liveTimer=setInterval(()=>{if(candles&&sess)doAnalyze(true);},30000);
  // Countdown
  countTimer=setInterval(()=>{
    countdown=countdown<=1?30:countdown-1;
    const el=document.getElementById("cd-bar");
    if(el)el.style.width=(countdown/30*100)+"%";
    const ct=document.getElementById("cd-text");
    if(ct)ct.textContent=countdown+"s";
  },1000);
  // Live P&L refresh every 5s
  plTimer=setInterval(()=>{
    if(!sess||!positions.length)return;
    const posEl=document.getElementById('pos-section');
    if(posEl)posEl.innerHTML=renderPositions();
  },5000);
}

          <div style="background:${pl>=0?"#021a10":"#1a0202"};border-radius:6px;padding:5px 8px;border:1px solid ${plC}30">
            <div style="font-size:9px;color:#475569">P&L</div>
            <div class="pl-live" style="font-size:12px;font-weight:900;color:${plC};font-family:monospace">${pl>=0?'+':''}$${typeof pl==='number'?pl.toFixed(2):'—'}${plPct?` (${pl>=0?'+':''}${plPct}%)`:''}</div>
          </div>
        </div>
        ${(p.stopLevel||p.limitLevel)?`
        <div style="display:flex;gap:10px;margin-top:5px;font-size:10px;color:#64748b">
          ${p.stopLevel?`<span>🔴 SL: <b style="color:#ef4444;font-family:monospace">${fmt(p.stopLevel)}</b></span>`:''}
          ${p.limitLevel?`<span>🟢 TP: <b style="color:#10b981;font-family:monospace">${fmt(p.limitLevel)}</b></span>`:''}
        </div>`:''}
      </div>`;
    }).join('')}
    ${positions.length>0&&balance?`
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid #1e2d45;display:flex;justify-content:space-between;font-size:11px">
      <span style="color:#64748b">P&L Total:</span>
      <span style="font-weight:800;color:${positions.reduce((a,p)=>a+calcLivePL(p),0)>=0?'#10b981':'#ef4444'}">
        ${(()=>{const t=positions.reduce((a,p)=>a+calcLivePL(p),0);return(t>=0?'+':'')+'$'+t.toFixed(2);})()}
      </span>
    </div>`:''}
  </div>`;
}

function renderAlerts(){
  if(!alertLog.length)return'';
  return`
  <div class="card" style="margin-top:12px">
    <div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:8px">🔔 Historial de Señales</div>
    <div style="max-height:200px;overflow-y:auto">
      ${alertLog.slice(0,15).map(a=>`
        <div style="background:${a.type==="buy"?"#021a10":"#1a0202"};border-radius:6px;padding:6px 8px;margin-bottom:3px;font-size:10px;display:flex;gap:8px;align-items:center">
          <span style="color:#475569;white-space:nowrap;font-family:monospace">${a.time}</span>
          <span style="color:#e2e8f0">${a.msg}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderSRSection(){
  if(!window._sr?.length)return'';
  return`
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:12px;font-weight:700;color:#fff;margin-bottom:8px">📌 Soportes y Resistencias</div>
    ${window._sr.slice(0,6).map(lv=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1e2d4530">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;font-weight:700;color:${lv.type==='R'?'#ef4444':'#10b981'}">${lv.type==='R'?'🔴 Resistencia':'🟢 Soporte'}</span>
          <span style="font-size:9px;color:#475569">×${lv.strength}</span>
        </div>
        <span style="font-size:12px;font-weight:800;color:#fff;font-family:monospace">${fmt(lv.price)}</span>
      </div>`).join('')}
  </div>`;
}

/* ===== LAYOUT BUILDER (called once) ===== */
function buildMainLayout(){
  const root=document.getElementById('app');
  if(!root)return;
  const isMobile=view==='phone';
  layoutViewMode=view;

  if(isMobile){
    root.innerHTML=`
      <div id="hdr-section"></div>
      <div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px" id="mob-assets-row"></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:4px;margin-bottom:10px" id="mob-assets-grid"></div>
      <div class="card" style="margin-bottom:10px;padding:8px">
        <div id="chart-container" style="height:260px;border-radius:8px;overflow:hidden"></div>
      </div>
      <div id="sig-section"></div>
      <div id="trend-section"></div>
      <div id="ind-section" class="ind-grid" style="margin-bottom:12px"></div>
      <div id="trade-btns-section"></div>
      <div id="pos-section"></div>
      <div id="alerts-section"></div>`;
  }else{
    root.innerHTML=`
      <div id="hdr-section"></div>
      <div style="display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start">
        <div>
          <div class="card" style="margin-bottom:12px;padding:10px">
            <div id="chart-container" style="height:380px;border-radius:8px;overflow:hidden"></div>
            <div id="chart-info-bar" style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:10px;color:#475569">
              <span>🖱️ Scroll para zoom · Arrastrar para mover</span>
            </div>
          </div>
          <div id="ind-section" class="ind-grid" style="margin-bottom:12px"></div>
          <div id="pos-section"></div>
          <div id="alerts-section"></div>
        </div>
        <div>
          <div id="sig-section"></div>
          <div id="trend-section"></div>
          <div id="trade-btns-section"></div>
          <div id="sr-section"></div>
        </div>
      </div>`;
  }

  layoutReady=true;
  buildChart();
}

function updateDynamicSections(){
  const isMobile=view==='phone';

  // Header
  const hdr=document.getElementById('hdr-section');
  if(hdr)hdr.innerHTML=renderHeader();

  // Mobile asset strips
  if(isMobile){
    const ar=document.getElementById('mob-assets-row');
    if(ar)ar.innerHTML=Object.keys(ASSETS).slice(1).map(c=>`<button onclick="cat='${c.replace(/'/g,"\\'")}';renderAssetList()" style="padding:5px 10px;border-radius:7px;border:1px solid ${cat===c?'#6366f1':'#1e2d45'};background:${cat===c?'#1a1f35':'#0d1525'};color:#fff;font-size:10px;cursor:pointer;white-space:nowrap">${c}</button>`).join('');
    const ag=document.getElementById('mob-assets-grid');
    if(ag)ag.innerHTML=(ASSETS[cat]||[]).slice(0,8).map(a=>`
      <button onclick="selectAsset('${a.epic}')" style="border:1px solid ${a.epic===asset.epic?'#6366f1':'#1e2d45'};border-radius:8px;background:${a.epic===asset.epic?'#1a1f35':'#0d1525'};color:#fff;padding:7px;text-align:center;cursor:pointer;font-size:9px">
        <div style="font-size:18px">${a.flag}</div><div style="margin-top:2px">${a.d}</div>
      </button>`).join('');
  }

  // Chart info bar
  const cib=document.getElementById('chart-info-bar');
  if(cib)cib.innerHTML=`<span>🖱️ Scroll para zoom · Arrastrar para mover</span>${window._sr?.length?`<span>📌 ${window._sr.length} niveles S&R identificados</span>`:''}`;

  // Signal
  const sigEl=document.getElementById('sig-section');
  if(sigEl)sigEl.innerHTML=renderSigCard();

  // Trend
  const trEl=document.getElementById('trend-section');
  if(trEl)trEl.innerHTML=renderTrendBar();

  // Indicators
  const indEl=document.getElementById('ind-section');
  if(indEl)indEl.innerHTML=renderIndicators();

  // Trade buttons
  const tbEl=document.getElementById('trade-btns-section');
  if(tbEl)tbEl.innerHTML=sig?renderTradeButtons():'';

  // Positions
  const posEl=document.getElementById('pos-section');
  if(posEl)posEl.innerHTML=renderPositions();

  // Alerts
  const alEl=document.getElementById('alerts-section');
  if(alEl)alEl.innerHTML=renderAlerts();

  // SR section (PC only)
  const srEl=document.getElementById('sr-section');
  if(srEl)srEl.innerHTML=renderSRSection();
}

/* ===== MAIN RENDER ===== */
function render(){
  const root=document.getElementById("app");
  if(!root)return;

  // Login screen
  if(!sess){
    layoutReady=false;
    destroyChart();
    root.innerHTML=`
    <div style="min-height:90vh;display:flex;align-items:center;justify-content:center;padding:16px">
      <div class="card" style="max-width:400px;width:100%;padding:28px">
        <div style="text-align:center;margin-bottom:28px">
          <div style="font-size:48px;margin-bottom:10px">📈</div>
          <h2 style="color:#fff;font-size:24px;font-weight:900">Trading AI Predictor</h2>
          <p style="color:#6366f1;font-size:13px;font-weight:600;margin-top:4px">v6.1 · Powered by Capital.com</p>
        </div>
        <div id="l-err" class="err" style="display:none;margin-bottom:14px"></div>
        <input id="l-key" placeholder="🔑 API Key" class="modal-inp" style="margin-bottom:10px"/>
        <input id="l-email" placeholder="📧 Email" class="modal-inp" style="margin-bottom:10px"/>
        <input id="l-pass" type="password" placeholder="🔒 Password" class="modal-inp" style="margin-bottom:14px"/>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:18px;color:#94a3b8;font-size:13px;cursor:pointer">
          <input id="l-demo" type="checkbox" checked style="width:16px;height:16px;accent-color:#6366f1"/> Cuenta DEMO
        </label>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div id="srv-badge">${srvBadge()}</div>
          <div style="font-size:10px;color:#475569">Render free tier</div>
        </div>
        <button id="l-btn" onclick="doLogin()" class="btn btn-green" style="width:100%;font-size:15px;padding:14px">🔌 Conectar a Capital.com</button>
        <p style="font-size:10px;color:#475569;text-align:center;margin-top:12px">La primera conexión del día puede tardar hasta 60 segundos</p>
      </div>
    </div>`;
    return;
  }

  // Build main layout if needed (only once or when view changes)
  if(!layoutReady||layoutViewMode!==view||!document.getElementById('chart-container')){
    buildMainLayout();
  }

  // Update dynamic content (never touches chart-container)
  updateDynamicSections();

  // Build/update chart
  if(!lwChart||!lwCandle){
    buildChart();
    setTimeout(()=>updateChart(),80);
  } else if(candles){
    updateChart();
  }

  renderModal();
}

/* ===== BOOT ===== */
renderSidebar();
render();
doAnalyze(true);
</script>
</body>
